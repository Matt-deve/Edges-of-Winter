pe","","*gosub_scene util read \"cont_historicchart\" \"${ch_type}\"","*set returnBucket returnData","","*temp ht_end 115","*temp ht_st 185","*temp wt_end 20","*temp wt_st 75","*temp st {\"${ch_type}_st\"}","*temp end {\"${ch_type}_end\"}","*temp did_mark false","*temp blank \"_ _\"","*temp mark \"_*_\"","","*temp gen_i 7","*label gen_loop","","*gosub_scene util read \"returnBucket\" gen_i","","*label pop_loop","*if (did_mark) or (returnData = nil)","    *set {\"${ch_type}_${st}\"} {\"${ch_type}_${st}\"}&(blank&\" \")","*elseif (returnData > st)","    *set did_mark true","    *set {\"${ch_type}_${st}\"} {\"${ch_type}_${st}\"}&(mark&\" \")","*else","    *set {\"${ch_type}_${st}\"} {\"${ch_type}_${st}\"}&(blank&\" \")","","*set st -5","","*comment -- next line?","*if (st >= end)","    *goto pop_loop","","*comment -- reset","*set st {\"${ch_type}_st\"}","*set did_mark false","*set gen_i +1","","*comment -- next age?","*if (gen_i <= 21)","    *goto pop_loop","","*comment -- write Chart","*set st {\"${ch_type}_st\"}","*label write_loop","${st}_ ${{ch_type&(\"_\"&st)}}","*line_break","*set st -5","*if (st >= end)","    *goto write_loop","","*return","","","*comment -- BASIC CHARACTER INFO -------------------------------------","*label basic_character_info","","*comment -- TODO -  create loop to read from character container and write their basic descriptions on to the page.","*label bchar_loop","*gosub_scene util read \"cont_characters\" \"\"","","*return","","*comment -- CLUBMATE INFO --------------------------------------------","*label clubmate_info","*comment -- TODO - loop through members in clubdata and then read data from character container and write to page.","","*return"], "labels":{"stats_start":4,"stats_res_loop":35,"settings":182,"gen_chart":210,"gen_loop":227,"pop_loop":231,"write_loop":257,"basic_character_info":268,"bchar_loop":271,"clubmate_info":277}},
"text_interlude": {"crc":-1744593026, "lines":["*label prelude","[b]Prelude - THE END[/b]","","The wind howls around your ears. A hungry wolf, baying for the warm flesh inside your jacket. It's call is chilling and you struggle to decide which is worse, the cold stream whipping into your clothing or the ice it drives, biting into your exposed face. Both take advantage of their prey, tearing into any opening they can find.","","Unrelenting. Unforgiving.","","One thing you need to be. And the other you hope others will not.","","But the clarity on those matters is as dense as the blizzard around you.","","The only thing that is clear through the chaos of wind whipped snow, is that you need to get off the mountain. You can also be quite certain which way to go. Down. But descending when you can't see more than a few metres ahead of you is making the exercise somewhat more time consuming.","","You're also not alone.","","However, your companion, the very reason you are three and half thousand metres up a mountain in the first place, is unconscious. Whether you consider this a blessing or a curse\u2026 it certainly makes things a little more complicated.","","*page_break","","They are wrapped in a silver foil emergency blanket, secured by ropes to your waist, and dangle down the slope from you. A human plumbline. You can be certain which way is down. You just can't be certain what is much beyond them.","","Your skis slough through the powdery snow. It is too deep to see them but you can feel the edges biting into a firmer layer beneath. A small comfort which reassures your aching legs.","","The weather wasn't supposed to be like this. It wasn't supposed to have taken this long. You weren't even supposed to be here. ","","People die on mountains.","","People die because they underestimate the weather. Because they are out too long. Because they were unprepared.","","If you find the ridge you can tack along it and onto a shallower bowl, much easier to ski and the easiest route down, but also known for its frequent avalanches following heavy snowfall. The gulleys are the most direct way down, and a favourite of big mountain adventure skiers, but even in good conditions they are treacherous. ","","*page_break","","The wind is unrelenting. You turn your cheek as the sting on your face is becoming too much.","","The wind is chilling you to the bone. You involuntarily shiver.","","The wind is pushing you to move. You weigh up your options.","","*choice","    #Find somewhere to wait out the blizzard","        Maybe someone will find you. If not\u2026","        ","        You and your companion [b]will[/b] die.","","        Hypothermia. Slow but inevitable.","        *set prelude_ch 1","    #Continue escorting them slowly down the mountain","        Slowly. Safely. Together.","","        If you don't rush, and keep your wits about you.","        ","        You have something to focus on. [i]Someone[/i] to focus on.","        *set prelude_ch 2","    #Abandon them and continue faster alone","        Speed is everything. But now you are racing your body temperature. Whichever descends fastest will win.","","        People die in the mountains.","","        But not [i]everyone[/i] has to die today.","        *set prelude_ch 3","*return","","*label a_distant_memory","[b]Interlude - A DISTANT MEMORY[/b]","","You're not sure what had made you think of your first few days of skiing. $!{player_club} had been your first real experience on the slopes. Now you were wondering if this mountainside would be your last.","","Not that your childhood had been easy, but those days seemed so bright and happy by comparison. Everything had been new and exciting, fun, and interesting. ","","As another flurry of snow and ice whips you across your face, you realise your options haven't changed. Wait for rescue. Carry on slowly with both of you. Or carry on alone.","","*if (prelude_ch = 1)","    You had wanted to wait for rescue. Someone at the chalet would be expecting you back, they would raise the alarm.","","    Eventually.","","    And the mountain rescue service would have to start making their way up the mountain to find you in this treacherous blizzard.","","    Even your slowly numbing mind knows they weren't going to be doing that. @{(backstory_index) You know first hand that there are limits to what the rescue services can do.|They would weigh the probability of finding you alive against the risk to their own crew.|You had spent alot of your life avoiding being found, ironic now that you wanted to be.|It would make for some good headlines though: \"Pair Found ALIVE in Worst Blizzard Since '76\"}","","*elseif (prelude_ch = 2)","    You had wanted to take them with you.","","    You couldn't just leave them behind. @{(backstory_index) You know sometimes there is no choice, but currently there is, and you don't want to repeat the previous experience.|When they say 'leave no witnesses behind', you're not sure this was quite what they meant. Although, someone needs to be the witness to your bravery at least.|You've had to leave people behind before. Fine. That was for their own safety. Leaving someone now, certainly would not be.|In saving their life you would also be saving your own. A sense of purpose, something solid to hold on to, follow them and they will lead you to some sort of truth.}","","*else","    You had wanted to carry on alone.","","    There are rules on the mountain that only make sense when you're faced with this sort of situation. @{(backstory_index) And you have faced this sort of situation before.|And at least now you could use the situation to justify your actions.|You feel strangely calm, for once you're not waiting for something to happen.|Unwritten rules are not a solid basis for a moral doctrine, but in the absence of anything better, at least they're lighter to carry. Or perhaps not.}","","*page_break","","@{(is_hyperactive) All this idle thinking, slow processing of information, is tiring you out even more. Despite the cold you still have an urge to be making progress.|}","@{(is_pessimist) You don't fancy your chances. This is almost certainly the end. You hadn't expected anything else really. After all you weren't even supposed to be here.|}","@{(is_panicky) You feel your heart rate rising, and breathing becoming more rapid. It has taken years of training to control your anxieties so you could handle the pressure of ski races.|}","@{(is_fanatic) You know this mountain well, from the maps you studied at least, although you can't be sure exactly where you are. This isn't your first time in a blizzard, or being at this altitude either. You have the training and the skills to get through this.|}","","You need to keep moving. To keep warm. To get out of the wind.","","Spindrift is being whipped off the slope and down the mountainside.","","You traverse a little further along, but it is slow going as the human ensconced in foil slides unevenly below you. Looking down past them you notice that, contrary to the rest of the visible slope, the airborne ice particles are moving upwards. An aerial eddy, spiralling around just at the edge of your vision.","","It takes a moment for the thought to register fully.","","An air current moving upwards. An even steeper section lies ahead. The gulleys.","","You must have missed the ridge, and now you are over the gulleys.","","The main route down the gulleys is called [i]'Highway'[/i], and has a flat launch-off spot called [i]'Service Station'[/i] where there is usually a couple of benches and tables. But on top of the ridge it is fairly flat, and would allow you to move over onto the sheltered side, out of the wind.","","@{(prelude_ch) Neither is an ideal spot to wait out a blizzard, but you need to dig a snowhole somewhere.|In either direction you'll need to check the conditions unencumbered before committing to the route.|Either way, you will need to get the deadweight off the rope before you can think about untying the frozen knots.}","","*choice","    #Head for the ridge","        *set interlude_1_ch 1","        You start your traverse across the current slope. It is too tiring to try to haul you and your casualty uphill. Staying at the same height you'll come to the ridge eventually when it dips down.","","        If you can still think straight by then.","","        @{(prelude_ch) You know that once you cross the ridge you'll be out of the biting wind. Holding on to that thought pushes you on.|You know this is the longer route, but much safer with two of you. But that won't make it easier. You know the cold and exertion is going to dull your body and mind, and you will both be exposed to the elements for longer.|You know this is the longer route, but much less technical. But that won't make it easier. You know the cold and exertion is going to dull your body and mind, and you will be exposed to the elements for longer.}","        ","    #Continue to the gulleys","        *set interlude_1_ch 2","        It isn't too far to the edge. The problem is finding the right gulley. There should be bright wooden markers at the top of the most commonly used descents, although the air dense with snow will make finding it difficult.","","        Most of the gulleys are possible to ski, but once you've dropped into one it is impossible to get out. After that, everything is going to happen fast.","","        You side slip your skis down a little closer to the edge, but not too much. You don't want your casualty slipping over and taking you with them.","","        A red post is just visible. You need to backtrack a little, but you'll make it. ","","The cold wraps around you, and seeps into your bones as you carefully push your skis through the powdery snow.","*return","","*label int2","[b]Interlude - TODO[/b]","","*return","","","*label int3","[b]Interlude - TODO[/b]","","*return","","*label int4","[b]Interlude - TODO[/b]","","*return"], "labels":{"prelude":0,"a_distant_memory":63,"int2":136,"int3":142,"int4":147}},
"text_prologue": {"crc":1889363682, "lines":["[b]Prologue - THE VERY BEGINNING[/b]","","You are sat cocooned in a blanket on the window sill in your bedroom.","","It's cold outside, the sky is a heavy grey and the leaves have mulched into a wet dark brown. The branches claw at the sky as if trying to climb out of the sodden earth.","","But then you see it\u2026","","The first one. The most exciting. The expectation. The promise.","","A snowflake gently tumbles past your window.","","So this is what the trees were grasping at\u2026","","Your eyes widen. Cheeks flush. Deep breath in\u2026","","\"SNOW!\" You yell, leaping from the sill leaving your cocoon behind.","","*gosub_scene util q_process 3","*page_break \u2026and so the season begins!","","You are 7 years old, so you can be forgiven your excited outburst. The first snow of the season is always the most exciting. It never stays of course, gone in a couple of days as the temperatures fluctuate, hovering above freezing for another week before finally dropping and [i]staying[/i] low.","","A further agonisingly long spell of dry and bright weather sees you becoming melancholy and feeling as if the winter will never arrive.","","But it does. And when it does, it really does.","","The morning you woke up to see the world outside turned into a monochrome pastiche, was simply [i]wonderful[/i].","","Your excitement at this development stems from\u2026","*gosub_scene util q_process 3","","*comment -- Set persistent personality quirks","@{(show_hints) [i][[Hint - This sets a 'personality quirk' which modifies certain events both positively and negatively]][/i]|}","*choice","    #My love of winter sports","        *set is_fanatic true","        Ever since you can remember you've always had a passion for winter sports. You don't remember exactly what it was that first attracted you to them, as it [i]was[/i] half a lifetime ago after all, but something about the way you could move on snow and ice so much faster and smoother was captivating.","","        If there was one thing you were going to obssess over for the next decade. It was this!","","    #Nothing good ever happens","        *set is_pessimist true","        Snow was something you had only ever seen on television. If it ever did snow in your home country, it certainly hadn't in your lifetime. Being able to see it first hand, falling literally out of the sky was mesmerising. The movement, the cold touch, the patterns, the drifts, everything was so new. How could it not be exciting!","","        Of course, it probably wasn't going to last. Like everything else in life, here today, gone tomorrow.","","    #My hyperactivity","        *set is_hyperactive true","        You have always been an active child. You would be the first up in the morning, racing around the house, climbing trees, and finding a hundred-and-one uses for any old cardboard boxes that your parents kept trying to throw away. Your parents do talk about the long car journey to your new home as though it was some traumatic event, and they do reassure you that they love you nonetheless. Of course, you didn't stop to think much about any subtleties in their exact wording. You were far too busy carrying a bicycle helmet, and a tea-tray up the stairs.","","        \"Now, heading to the start line is the youngest ever athlete to attempt the skeleton bob\u2026\" Your commentary began.","","    #It's actually panic","        *set is_panicky true","        A child psychologist might explain it better than you can, but for some reason you are actually terrified of snow. Maybe its because you've been through some big changes, moving country to a new home, and now the clouds are literally breaking apart and falling all over the garden. How is no-one else concerned by this!","","        You rationalise the hell out of the siutation and it calms your nerves. For now\u2026","","The first winter in your new home was certainly going to be an interesting one. You had only just started school and not yet really got to know the other children that well yet. Although apparently \u2014or so your parents told you\u2014 the best way to get to know everyone was to join in with the local customs and activities, which just so happened to be skiing.","","You remember the conversation between your parents and teacher like it was yesterday\u2026","","*gosub_scene util q_process 3","*page_break 1 day earlier\u2026","","\"Really? [i]All[/i] the parents send their seven-year-olds skiing?\" Your mother had said with some disbelief.","","The teacher was very smiley and almost constantly nodded their head whilst speaking, \"Well no, not [i]all[/i] the children do skiing.\"","","Your mother developed that half-smiling look which was usually followed by a morality tale. But it did not last long, as your teacher continued, \"Some do snow-boarding, or ski-jumping, I hear they're opening a luge track next year-\"","","\"Oh my!\" Your mother gasps as her hand half covers her mouth.","","\"Is this a town of millionaires or something?\" Your father was sweating slightly despite the cool weather.","","\"Oh no!\" Your teacher chuckled, \"The clubs are quite affordable, even the more expensive ones aren't totally out of reach even for me on a teacher's salary, and some of them are even free. Usually lessons are for a couple of hours, two or three times per week.\"","","\"Hmmm\u2026\" Your father had raised an eyebrow in interest, and started to gaze off into the distance.","","You generally thought of your family as\u2014","","@{(show_hints) [i][[Hint - This will set your background wealth level - which will also set certain expectations of you]][/i]|}","*temp ch_wealth \"Given your limited range of life experiences, whether relatively or absolutely, wealth wasn't a concept you fully understood.\"","*choice","    #Very Rich","        *set wealth 5","        ${ch_wealth} But even you had noticed your family tended to have a better looking car, a larger house, nicer and fancier things in that house, and more fashionable clothing than some of the other families in your home country. ","    #Affluent","        *set wealth 4","        ${ch_wealth} You could tell you did not always have [i]the best[/i] of everything, but what you did have certainly looked newer than most. ","    #Averagely wealthy","        *set wealth 3","        ${ch_wealth} You knew your family definitely wasn't rich. But they definitely weren't poor either. You usually had off-brand common items, but there never seemed like there was any real barrier to getting them.","    #A bit poor","        *set wealth 2","        ${ch_wealth} There were times when your parents would surprise you by 'splashing out' on some item or other. Sometimes you couldn't even find the initials on it, or it would come in a clean-looking box. Those moments were scarce enough to feel exciting, but common enough to not feel unique.","    #Hard-up","        *set wealth 1","        ${ch_wealth} You were clothed and fed, housed and cared for, but there was usually tension in the air when it came to purchases that were not essential. It felt like that, other than food-shopping, window shopping was [i]the only[/i] other type that felt positive afterwards.","","Although your teacher had said they were all affordable, there was a lot of other costs involved. Ski equipment was still pricy, and it simply wasn't feasible to rent gear everytime. On top of this was the cost of transport and ski passes, clothing, and protective equipment.","","There was a big shopping list\u2026","*gosub_scene util q_process 3","*page_break","","They kept talking for a while longer, but your seven year old brain couldn't handle any more droning on and you totally tuned out.","","You had moved to a wide valley surrounded by grey pinacled peaks. Forests skirted their flanks before thinning out into rock, snow, and ice. At the head of the valley a glacier perched itself on the north slope of the Grand Mountain overseeing all those who would attempt to reach it's peak.","","Fortunately for those attempting the feat today, there was a chair lift. In fact, slicing through the pine forests every so often was all manner of infrastructure related to the Valley's primary source of income. Winter Sports.","","Moving here was a choice you had not been allowed to make. But given your past, was one that your parents had to because of\u2026","","@{(show_hints) [i][[Hint - This sets your main backstory modifying content but also locking later branches]][/i]|}","","*choice","    #\u2026'the accident'.","        *set backstory \"unfortunate\"","        *set backstory_index 1","        There hadn't been anything anyone could have done.","","        You kept waking at night from dreams where it plays out over and over and over again. What choices could you have made that could have lead to a different ending than the one that you must now live with? But every choice you made that day, every permutation, every overestimation of your ability and even your fantasy of possessing superpowers, still wrought the same ending.","        ","        It had been ordained by a higher power.","        *line_break","        It was a natural inevitablity.","        *line_break","        It was a scripted loss.","","        You couldn't stay there. No-one could.","","    #\u2026something you did.","        *set backstory \"malevolent\"","        *set backstory_index 2","        Everyone kept saying,","        *line_break","        \"[i]It[/i] wasn't your fault\",","        *line_break","        \"[i]it[/i] was an accident\",","        *line_break","        \"they didn't [i]mean[/i] to.\"","","        But you knew something different,","        *line_break","        [i]It[/i] was your fault.","        *line_break","        [i]It[/i] hadn't been an accident.","        *line_break","        You had [i]meant[/i] to.","","        The newspapers didn't pick up on the story. Your young age served as a protective factor from any detailed scrutiny, and in the absence of any witnesses, even your confession was turned into a symptom of trauma. Everyone around you ran damage control, no-one wanted it to have been anything other than an accident. Blame couldn't have been assigned to you, and it wouldn't have travelled far.","","        Instead, to escape the gossip, the suspicious looks, the ostracisation that [i]you[/i] had caused, your family moved far away. To somewhere, that hopefully, would never find out.","","    #\u2026some bad people.","        *set backstory \"traumatic\"","        *set backstory_index 3","        You don't know the full story.","        ","        No-one would tell you. Protecting the innocent, leaving them in blissful ignorance, or so the idea would run from snippets of conversations you weren't meant to hear.","        ","        Or perhaps they couldn't. The responsibility of knowing would have been too risky a burden for you to share.","        ","        Neither mattered. The fear permeating through daily life was not 'blissful' and the lack of knowledge didn't mitigate the risk. The blue lights on your street and the pall of smoke was the turning point. The moment your vehicle literally turned around and made its way to the airport. The moment you realised why your parents always carried a backpack full of 'essentials', and why they now never try to hurry you when tying your shoelaces.","","    #\u2026something you can't explain.","        *set backstory \"mysterious\"","        *set backstory_index 4","        You have no real recollection of the events leading up to the arrival in this country.","        ","        You don't know why. Maybe you forgot\u2026","","        Maybe aliens abducted you, and wiped your memory\u2026","","        Maybe you were a secret Artifical Intelligence experiment in a test facility and weren't turned on until you were deployed to the field\u2026","","        How could you ever tell the difference? You wonder what your purpose is? And why?","","        Why indeed? But then, why anything? Why life, the universe, and everything?","","Emerging from your silent reverie, you rejoin the present and try to forget about the past.","*gosub_scene util q_process 3","*page_break","","Your parents had to pick a club for you to join. ","","The list of clubs available to you looked boring written on an A4 pad of lined paper. A lot of numbers written around long names, and although you were excited at first when your parents started punching them into the telephone, the one-sided conversation of \"uh-hmm\" and \"ok, so\u2026\" strained your attention. So you went outside to play.","","About a billion hours later, your parents had you strapped in the car, so you could meet up with one of the club instructors and get a feel for the club. They handed you the list and let you pick which one to visit first.","*if(wealth < 4)","    You note some had already been crossed out. They had the money symbols with larger numbers written next to them.","*temp min false","*temp exc true","","*label club_meet","","Who do you want to meet up with?","","@{(show_notes) [i][[Note - These meetings are taster sessions, after visiting at least one, an option to pick your first club will appear. You can visit all as many times as needed.]][/i]|}","*choice","    #Community Sports Club","        *set min true","        You met the instructor for the community sports club outside the local school. It turns out they were actually your P.E. teacher! Small world. Despite this, you hadn't actually spoken to them up until now, and having had only one lesson with them so far this year, you didn't know anything about them. Except that they liked to send little children on loooong runs.","","        Exhausting.","","        \"Hey there!\" Their friendly greeting came with a wave. \"I remember you out on the field last week, great running skills, very fit. You're certainly going to give the others a 'run' for their money.\"","","        It seemed the man had the same sense of humour as your father.","        ","        \"My names Karl, and with Dana and Rafi, we run the club for anyone who can make it! Most of the kids here are from your school, but also we accept any child who lives in the valley. It's quite lively, and quite busy, as you can imagine, but we do try to give everyone an opportunity to join in, so we have a small stock of donated equipment you can use. Also! In the summer we organise lots of other activities and a camp at the seaside, so we're not [i]just[/i] about skiing here.\"","","        Your parents are nodding approvingly. You drift in and out of the rest of the conversation as no-one seems to be paying you much attention until it's time to go.","        *goto club_meet","    *selectable_if (wealth > 1) #Racing Kids","        *set min true","        The instructor for Racing Kids was a middle-aged man with greying hair, and stubble covering his chin. Whilst he chatted to your parents about the club ethos, training schedules, and safety, you noted his jacket was covered in sew-on patches of various colours. Inspecting them closer you noted they all depicted either mountains, skiers, snowboarders, or dense woodland, usually accompanied by a year and the name of somewhere you had never heard of.","","        You tune back into the conversation.","","        \"\u2026so that's when I founded the club, and that was, what? Eight years ago now. I had always enjoyed racing as a kid, so I wanted to pass that passion on.\"","","        Your parents are smiling and nodding as he rambles on a little longer.","","        \"Mind you, it's not quite the same y'know, there's a lot more safety involved nowadays. Which [i]is a good thing![/i]\" He chuckles to himself. \"But I guess those can be stories for another time. I should let you all get on.\"","","        Everyone says their 'goodbyes' and it is time to go.        ","        *goto club_meet","    *selectable_if(exc) #Fultzman's Ski Team","        *set exc false","        \"Oh sorry!\" Your mother exclaims, \"Fultzman's Ski Team doesn't take on beginners. They're much more for competitive racers.\"","","        \"Should hope so, given the price he was asking for\u2014\" your father began but stopped, upon noticing the glare he was receiving.","","        Your mother reached out to take the list back, \"I'll just cross it off for you, for now, maybe next year they'll accept you. I'll also cross off City Ski Team, as they're also quite competitive.\"","        *goto club_meet","    *selectable_if(wealth > 3) #Snowstyle Ski Club","        *set min true","        A representative from the Snowstyle Ski Club met you all in the lobby of the hotel [i]'Dolci Colline'[/i]. It was the largest hotel you had ever been in, the floors were so shiny and smooth, and literally everyone looked like they belonged in one of those fashion magazines. Porters ferried into and out of the lifts to the rooms constantly, luggage, ski bags, pets\u2026 ","","        You could not really pay attention to anything the rep was actually saying, although the tempo of the conversation felt familiar, something that perhaps you had witnessed before in a number of different shops.","","        \"So who actually does the instructing?\" Your mothers voice brings you into the conversation.","","        \"Well, this year we have someone who was one of the coaches for the Winter Olympic team. Romuld Hvargost?\" The rep doesn't expect anyone to actually know who they are, so immediately moves into reassurance mode. \"He is spoken of very highly in the Winter Sports Association, he's helped coach four medal winners over the years, so we are all really excited to have him on board.\"","","        \"Sounds impressive.\" Says your father cocking one eyebrow.","        *goto club_meet","    *selectable_if(exc) #City Ski Team","        *set exc false","        \"City Ski Team? Oh erm\u2026\" Your mother begins, and turns to your father, \"Weren't they only taking on seasoned skiers?\"","","        \"Hmm\u2026 City? Oh yes - funny story,\" he turns around to look at you, \"they asked me how many points you had last year. I joked with them, 'what? On their license?' and they were so serious and said 'yes'. Can you believe it!?\"","","        \"They meant something else\u2026 I think\u2026 I hope\u2026 Can you just hand me the list, and I'll cross them off for you. Oh and Fultzman's Ski Team too. They're also pretty serious.\"","","        She hands the list back to you with the amendments made.","        *goto club_meet        ","    *selectable_if(wealth > 1) #Carly's Carvers Ski Club","        *set min true","        Carly met you outside a ski service shop, and greeted you with a high-five.","","        \"Yo! Good five! So you thinking about joining our club?\" She had crouched down to your level, \"Ready to hit the slopes?\"","","        You nod, and before you can say anything she's already congratulating you, \"Great one! I know you'll be good I could feel it in that high-five you gave me.\" She holds her hand up for another one, \"Go-on once more!\"","","        Your hands meet with a loud clap, where she feigns an injury, \"Oooh, I'll have to put my gloves on next time!\"","","        She looks you in the eyes as she tells you about the club, \"So we're like a bit of a 'cool' club, if you just want to ski and enjoy the view that's great, but we also train for the [i]ski-races[/i],\" her eyes light up, \"and we strongly encourage you to enter into [i]competitions[/i], because\u2026\" she gives a short drum roll on her thigh, \"\u2026you can win [i]prizes[/i]! Sound exciting?\"","","        She beams at you again, and offers a hand for another high-five.","","        Still smiling, and full of energy she stands up to talk to your parents about 'details' until it's time to go. She gives you a wave, and then dives into the ski shop before emerging moments later with two armfuls of skis.","        *goto club_meet","    *if(min) #[b]I've seen enough, I'm ready to choose[/b]","        Tired of visiting the different instructors your parents say they are fine with whichever you choose from those remaining on the list. They will definitely ask you to double-check your choice.","","        @{(show_hints) [i][[Hint - This will set which club you will train and compete with this season, and set early character introductions - it will be possible to change clubs later]][/i]|}","        *label choose_club","        *choice","            #Community Sports Club [i]${euro}[/i]","                *set player_club \"Community Sports Club\"","                *set player_clubcode \"CSC\"","                \"The free one\u2026 not sure how much they know about skiing though.\" Notes your father.","","                \"Lots of other kids though, you'll easily find someone you like, and they seem much more 'rounded' in terms of tuition.\" Remarks your mother.","                *goto are_you_sure","            *selectable_if(wealth > 1) #Racing Kids [i]${euro}${euro}[/i]","                *set player_club \"Racing Kids\"","                *set player_clubcode \"RCK\"","                \"He seemed like a nice fellow, though I didn't catch his name? I gather he is [i]full[/i] of stories.\" Says your mother.","","                \"Seems like he knows his stuff, and affordable.\" agrees your father, \"Just wants to pass on his knowledge whilst he has the chance. Maybe I'll end up starting a club one day\u2026\"","                *goto are_you_sure","            *selectable_if(false) #Fultzman's Ski Team [i]${euro}${euro}${euro}${euro}[/i]","                This option should be UNAVAILABLE.","            *selectable_if(wealth > 3) #Snowstyle Ski Club [i]${euro}${euro}${euro}${euro}[/i]","                *set player_club \"Snowstyle Ski Club\"","                *set player_clubcode \"SSC\"","                \"Well you certainly get what you pay for with this one.\" Remarks your father.","","                \"They do seem well organised, and have good contacts.\" Agrees your mother.","","                *goto are_you_sure","            *selectable_if(false) #City Ski Team [i]${euro}${euro}${euro}[/i]","                This option should be UNAVAILABLE.","            *selectable_if(wealth > 1) #Carly's Carvers Ski Club [i]${euro}${euro}[/i]","                *set player_club \"Carly's Carvers Ski Club\"","                *set player_clubcode \"CCC\"","                \"Reasonable price, and she seems fun.\" Remarks your father.","","                \"Works at a ski service shop too, could be handy.\" Your mother comments.","                *goto are_you_sure","            #Actually, maybe we should revisit the list","                *goto club_meet","","*label are_you_sure","","You are pointing to [b]${player_club}[/b] on the list.","","\"Are you sure?\" Asks your mother.","","*comment -- *if(is_wip)","*comment --     [i][[WIP Note - There is slightly @{(player_clubcode = \"SSC\") more|less} story-related content if you choose this club.]][/i]","","*choice","    #Yep, that's the one.","        \"Okay, we'll sign you up to the ${player_club} first thing tomorrow.\" Your dad smiles at you.","        *gosub_scene util insert \"cont_clubdata\" \"${player_clubcode}/members\" \"\" \"${player_code}\"","        *gosub_scene util update \"cont_competitors\" \"${player_code}/clubcode\" \"${player_clubcode}\"","    #No! Oops. Finger slipped.","        *goto choose_club","","Your father then made some comment about how \"he was pretty sure that, back home, child services would have had something to say about sending 7 year olds down a hill at high speed, in what resembled mediaeval fighting equipment all in the name of 'sport'\". ","","But here, it was frowned upon if you didn't.","","*gosub_scene util q_process 3","*page_break A few days later\u2026","","It was your first day at the new club.","","You were excited\u2026","","You were nervous\u2026","","You needed the toilet.","","Bladders are only so big and your parents had [i]insisted[/i] on you being early on the first day to make a [i]good impression[/i]. So much for a good impression if you are crossing your legs and fidgeting, and really unable to pay attention because it feels like you are going to explode.","","You have a couple of options open to you. Ask to go to the toilet now. Or hold it.","","*choice","    #Ask","        Good plan. You saved yourself a huge amount of embarassment on your first day at ${player_club}.","    #Hold it","        Brave choice.","        ","        But nope, not in a million years would you be able to hold it that long without being noticed. Luckily your mother was paying attention, and to save you a huge amount of embarassment suggested a quick trip to the bathrooms.","","You arrive at the bathrooms, there is one for boys and one for girls. So of course you choose to go into the one you were told to use, because you are currently seven-years-old and don't get a whole lot of choice in these matters just yet.","","@{(show_hints) [i][[Hint - This will set your sex and initial gender, currently the races are mixed-sex, but will segregate later on. This makes no difference to races, but may affect story content later.]][/i]|}","","*choice","    #Boys","        *set player_gender \"m\"","    #Girls","        *set player_gender \"f\"","","Obviously you used the @{(player_gender = \"m\") boys'|girls'} bathroom, because this is how everyone else sees you, and how you interact with the world. Which is good, because you are also at the age where you think all @{(player_gender = \"m\") girls|boys} are ugly. Well. Maybe that last part isn't quite true.","","@{(backstory_index) You cast your mind to the friends you had to leave behind. Faces you are missing, and faces that went missing.|The differences between your home country and this new one are quite remarkable, and you have noticed that there is a lot less fighting in the playground.|You never did get chance to say goodbye to anyone you knew. Do they remember you at all?|There are faces that you conjure up, but you aren't sure if they are from your imagination or your memory.}","","You shudder@{(backstory = \"mysterious\") | at the brief memory}, unwilling to think about it now, you run to rejoin your parents.","","*gosub_scene util q_process 3","*page_break A world away\u2026","","Your parents usually made all the decisions for you. Well, most major ones anyway, you were still allowed to pick your favourite colour.","","*choice","    #Red","        It was red. Like fire engines and stop lights.","    #Blue","        It was blue. Like the sky and the sea.","    #Green","        It was green. Like the grass, and peas.","    #Yellow","        It was yellow. Like the sand, and bananas.","    #Something else","        It was something else.","        ","Either way it's not important right now. The point was, that they had even got to pick your name, but that seems patently unfair! It is [i]your[/i] name after all, something that everyone is going to identify you as for the rest of your life so surely you should get to choose it? But instead they had named you @{(player_gender = \"m\") Alexis|Alexa}.","","*choice","    #Luckily I'm fine with that","        *if (player_gender = \"m\")","            *set player_name \"Alexis\"","        *else","            *set player_name \"Alexa\"","        So you just went along with it. ","        ","        [i]'Flowers would smell just as nice even with a different name'[/i]","","        Or something like that.","    #What were they thinking!?","        It certainly was not a name you would have chosen yourself. So at the age of five you went through a period of informing everyone your name was in fact something else. You would only answer to that name, and would only give that name when required to do so.","","        Despite what the nice lady who smelt of cinnamon in the office with a comfy chair said, it wasn't 'just a phase' and eventually it stuck.","        *label name_choice","        The name you had chosen was:","        *choice","            *if(player_gender = \"m\") #Bartholomew","                *set player_name \"Bartholomew\"","            *if(player_gender = \"m\") #Zach","                *set player_name \"Zach\"","            *if(player_gender = \"m\") #John","                *set player_name \"John\"","            *if(player_gender = \"m\") #Aditya","                *set player_name \"Aditya\"","            *if(player_gender = \"m\") #Malik","                *set player_name \"Malik\"","            *if(player_gender = \"f\") #Charlotte","                *set player_name \"Charlotte\"","            *if(player_gender = \"f\") #Aamina","                *set player_name \"Aamina\"","            *if(player_gender = \"f\") #Navya","                *set player_name \"Navya\"","            *if(player_gender = \"f\") #Mary","                *set player_name \"Mary\"","            *if(player_gender = \"f\") #Skylar","                *set player_name \"Skylar\"","            #Something else","                You chose a different name, which was\u2026","                *input_text player_name","","","        The name you had chosen was [b]$!{player_name}[/b].","","        And you were perfectly happy about that.","","        *choice","            #Yes, perfectly happy","                Yes you were perfectly happy about that.","","                Your parents\u2026 Not so much.","                *line_break","                It required a lot of extra explaining when filling out entrance forms for schools, and the same tired conversation kept coming up again and again. But even they grew to love\u2026","                *line_break","                tolerate\u2026 ","                *line_break","                accept\u2026 yes, they learnt to accept it. That was now who you were, $!{player_name}.","            #No, actually I chose something else","                *goto name_choice","        ","        And the name that had been thrust upon your family by cultural conventions and shared history \u2014 and upon your mother by marriage \u2014 was\u2026","        *label surname_choice","        *choice","            #Allesand","                *set player_surname \"Allesand\"","            #Russo","                *set player_surname \"Russo\"","            #Quattrell","                *set player_surname \"Quattrell\"","            #Chen","                *set player_surname \"Chen\"","            #Something else","                'Something else'? That's an unusual surname.","","                Oh sorry, of course, here you go you can pick your own\u2026","                *input_text player_surname","","        Your full name was [b]${player_name} ${player_surname}[/b].","","        Is that right?","        *choice","            #Yes","                Great, now we can continue.","            #No","                No? Whoops\u2026 What do we need to fix?","                *choice","                    #Everything [i](name and surname)[/i]","                        *gosub_scene career_manager name_choice","                        *gosub_scene career_manager surname_choice","                    #Surname only","                        *gosub_scene career_manager surname_choice","                    #Name only","                        *gosub_scene career_manager name_choice","","*gosub_scene util update \"cont_competitors\" \"${player_code}/name\" \"$!{player_name}\"","*gosub_scene util update \"cont_competitors\" \"${player_code}/surname\" \"$!{player_surname}\"","","*gosub_scene util q_process 3","*page_break Back in the now\u2026","","*gosub_scene util read \"cont_clubdata\" \"${player_clubcode}\"","*set club_bucket returnData","*gosub_scene util read \"club_bucket\" \"inst\"","*set club_inst returnData","","*if (player_clubcode = \"CSC\")","    Your instructor-slash-teacher is running back and forth with some of the older children, carrying an assortment of ski boots, helmets and poles. Between them they have created a haphazard semi-circle of equipment across the gym floor. A handful of other fresh looking faces also watch on in bewilderment. It seeems the congregation point for the new recruits was just inside the gym doors, whilst seasoned veterans of the club were thundering around the middle.","","    Teacher ${club_inst} approaches with a smile, but stops about halfway to turn around to the rest of the group and raises his voice for them to now go outside and start training with Dana. As the din begins to die down, he continues over and claps his hands together.","","    \"Right! Glad you could all make it, I'm sure you all know each other more or less from school, so we'll dive straight in to getting you sized up for kit if you need it.\" He begins pointing to a table with paper on it, and starts addressing the gaggle of parents. \"If I could get you mums and dads to fill out one of the slips with what equipment you'd like to borrow, and fill in the sizes that'll make things a bit easier.\"","","    His gaze pans down to child level. \"The rest of you come with me.\"","","    *page_break","","    There are six of you, and together he huddles you around a basket of balls and bean bags. He selects two of wildly different sizes and motions for everyone to stand in a circle. \"Ok say [i]your[/i] name, when you catch the big ball, and when you throw the small one you have to say the name of the person you are throwing it to.\"","    ","    He throws the big ball straight to you. \"Uh. $!{player_name}!\" You manage, then toss the ball vaguely across the circle from you.","","    The game continues for a few more minutes before you are called to rejoin your parents for a chat about exactly what equipment you MUST have, and what equipment they will need to borrow.","","    The essential list is; skis, ski boots, poles, and helmet.","","    *choice","        *selectable_if(wealth < 3) #We need to borrow everything","            Strictly speaking you don't [i]need[/i] to borrow everything, but it would free up your budget considerably. However, the quality and style of the equipment available is like a, 'worn and battered jumper that you just can't bear to throw out, not for any sentimental reason, but just because you don't want to waste a perfectly serviceable jumper'. You're not sure if there is a word which captures that feeling in your language.","","            The equipment handed to you includes a pair of grey skis with a yellow stripe, and a pair of battered red ski poles. You also receive a pair of lime green ski boots covered with scratches and some serious looking gouges in the plastic around the ankles. The boots do prove relatively comfortable, although also smell a bit weird. The last thing you receive is a plain black ski helmet, which other than a few scuffs, is simply unremarkable.","        *selectable_if(wealth < 4) #We would like to borrow some things","            Your parents can probably stretch their budget to accommodate some purchases, but it would obviously free up some of their budget if you could use some borrowed equipment. At least for now.","","            *temp borrowed \"\"","            *label borrow_choice","            You are @{(borrowed = \"\") |also }going to borrow:","            *choice","                *hide_reuse #Skis","                    *set borrowed &\", skis\"","                    ${club_inst} measures the skis against your height to find the right sizes. You can only borrow one pair, although ideally you will need two pairs of different sizes and shapes in order to train the correct technique for the different races.","                    ","                    There isn't much choice, but the pair of skis you end up with are just a dull grey colour with a yellow stripe. Still, the skis are one of the most expensive items, so borrowing these is a big saving.","                    *goto borrow_choice","                *hide_reuse #Ski boots","                    *set borrowed &\", boots\"","                    The ski boots in your size look like they have marched across a vast rocky desert. They are covered in scratches and the lime green plastic has multiple gouges around the ankles. The velcro strap is frayed and the metalic paint on the buckles is all but gone. They certainly are [i]worn[/i]. Nevertheless, they fit you fine, and it looks like the inner boot has actually been replaced at some point, enhancing the comfort a little and possibly making up for the smell of shoe deodoriser.","                    *goto borrow_choice","                *hide_reuse #Ski poles","                    *set borrowed &\", poles\"","                    All the poles look the same to you, but after going through a strange ritual of getting you to hold the pole upside-down a few times, ${club_inst} selects a pair which used to be red.","","                    Ski poles are one of the cheaper items, so borrowing these doesn't save a huge amount, but it also doesn't really make much difference to performance, and at the end of the day, every little counts.","                    *goto borrow_choice","                *hide_reuse #Helmet","                    *set borrowed &\", helmet\"","                    Thankfully the helmets do not look anywhere nearly as battered as the rest of the equipment, only a little scuffed perhaps from jostling amongst other items. ${club_inst} explains that the club received them as a donation from an outlet store last year as they were clearing their inventory before summer. They were all plain black, but quite serviceable. ","                    *goto borrow_choice","                *selectable_if(borrowed != \"\") #That is everything, I'm ready to go","                    You have decided to borrow${borrowed}.","","","        *selectable_if(wealth > 2) #We won't need to borrow anything","            There is no shame in borrowing the equipment, but your family would not wish to deprive someone else the opportunity to use it. Also, purchasing your own equipment will give you a lot more freedom to choose the style and the quality of the items, which given the battered appearance of the assembled accoutrements, did raise your parent's eyebrows.","","    Equipment collected you rejoin the other children in a game until it is time to go.","","    All-in-all a succesful first day, and you even learnt some of the other children's names\u2026 oh wait. ${club_inst} had called you away too early to register what they were. Shoot. It will have to wait until the next training.","","*elseif (player_clubcode = \"RCK\")","    The [i]'Pinewood Slopes'[/i] ski complex is not officially open yet, and the car park is almost empty. You can see one chairlift working, but it seems to be being used to transport bottles and other goods up to the cafe you can just about make out through the trees near the top. The lift stops once the delivery reaches the station, and doesn't seem to be about to move again. But whilst you were watching the ski infrastructure, your instructor has pulled up in a white 9-seater minivan. On the side the 'Racing Kids' logo really stands out, the design makes it look like the club's name is bursting through the metal panelwork and a 'skull and cross-skis' separates the two words. The skull is wearing a helmet and goggles, which sort of makes it look a little less intimidating.","    ","    There aren't many other children arriving, but they are all already dressed up in ski-boots and helmets and carrying skis and poles. Everyone congregates around the van, and you head over to join them.","","    \"Hey everyone, we have a new recruit with us today.\" He says through the open driver's door. \"So everyone say 'hi' to ${player_name}, and make some room.\"","","    He hops out of the driver's seat and flings open the side door where a pair of boots and a helmet lie waiting. You approach the group and amongst a flurry of handshakes and names you don't quite catch, you become enveloped as part of the semi-circle.","","    *page_break","","    \"Now, when I was your age we didn't have ski clubs.\" He is talking to you, but is reaching for the boots and helmet. \"Everyone used to ski everywhere in the winter. And that's because there wasn't all these fancy snowploughs and gritting machines you see racing up the main street nowadays. So we would ski to school. The only boots we had were our regular winter boots, and we would have to strap our feet with leather straps onto the skis.\"","","    He hands you the boots, which are heavier than they look.","    ","    \"Take a seat, put them on.\" He motions for you to sit in the footwell. \"And the way we learnt to ski was just by buckling up and getting out there and doing it for ourselves.\" He pauses for emphasis. \"So guess what we're going to do today.\"","","    He had picked up the helmet and was sliding it down over your ears before you even had chance to look up.","","    \"Ha, a perfect fit!\"","","    *page_break","","    Walking across the gravel of the carpark in ski boots was not easy. Every step seemed to throw you off-balance, you could not bend your ankles properly and the boot kept pressing into your shin. It got easier once you reached the snow, which cushioned most of the impact. The other children had already crossed a flat snowy area and started up the slope.","    ","    You were quite relieved when they stopped after only about thirty or so metres. Your instructor was close behind carrying a pair of skis for you, and a snow shovel.","","    Once you reached the others you turn back to see the instructor busily shovelling snow into a small hillock roughly halfway down from where you stood. After a couple of minutes of him beating and shaping the snow he comes up to join you.","","    \"Right then, who wants to try this out first?\"","","    A chorus of 'me's follow, and he picks one of the older boys who was jumping up and down near the back. Your mouth drops open as you realise he had been jumping up and down in those heavy boots and with skis on. A moment later, he pushes off with his poles and aims straight for the mound of snow. There is a soft swishing sound as the skis run on the snow, and then a moment of silence\u2026","","    The boy was flapping his arms like a bird as he soared through the air. Then a soft slapping sound as he landed neatly near the bottom of the slope. He finally came to a rest on the flat area, and gave a big thumbs up.","","    *page_break","","    \"Ok, so do you think you want to try that?\" The instructor is looking directly at you.","","    You look him up and down taking in the jacket full of patches, where you notice amongst them all is actually a name badge, '${club_inst}' it reads. ","","    *choice","        #Let's do this!","            ${club_inst} laughs kindly at your enthusiasm, \"Ok then. Have at it.\"","","        #Well, they did make it look easy","            You look back and forth between the slope and ${club_inst}, you suppose he wouldn't have suggested it if it wasn't safe.","        #Ok, but I'm closing my eyes","            You stare down a the mountain of snow, which didn't look nearly so steep, and nearly so big from the bottom. 'It'll be fine, it'll be fine', you think to yourself.","        #I'm going to die","            Your first time on skis and this crazy man is expecting you to ski off what looks like a huge cliff! You've got to be kidding. ${club_inst} notices your apprehension, \"Everyone has to start somewhere\u2026\"","","    Determined to make a good impression you clip into the skis and attempt to waddle them round to face down the slope. One catches under the other, and with the foot you want to move now pinned, your center of balance carries you inelegantly to the ground.","","    \"Ha ha! That's the spirit!\" ${club_inst} cries out, and offers a hand to help you up. \"It's good to get that first fall out the way, you know it's going to happen at some point, but if you don't push yourself to that point, well, then you don't know where your limits are. So good going!\"","","    \"Yeah don't worry, we're always falling over!\" Pipes up a boy slightly older than you wearing a jacket with the club logo on the back. He pushes off and whisks down the hill to join the eldest.","","    *page_break","","    Thankfully the remainder of the lesson involved some more basic tuition of how to move around on skis. Just before your parents arrived to collect you, there was a race on the flat section from one side to the other. You expected you would come last, being one of the youngest and your technique felt like a crawl in comparison, but you didn't. In their exuberance the older boys all managed to tangle themselves together and collapsed in a spaghetti-like mess of limbs and skis.","","    Mid-table result. Not bad for your first time out.","","*elseif (player_clubcode = \"SSC\")","    For the first session with Snowstyle Ski Club, they had asked you all to meet again at the [i]Dolci Colline[/i]. You were waiting patiently in the lobby seated next to a glass coffee table with a demure spread of international newspapers. You noticed other guests with children coming and going, but still no-one who looked as though they might be about to hit the slopes. This was probably not too surprising as the nearest ski-resort [i]Kliptzal[/i], was only due to open at the weekend. A gondola was visible through the hotel lobby's windows, ferrying guests to and from the village of chalets at the base of Kliptzal's famously scenic slopes, although you can only see the bottom station from where you are.","","    A woman wearing a white side-cut dress, black leggings and a black furry short-jacket approaches you. She daintily extends a hand to your parents and then to yourself. Looking up into her youthful looking face framed by jet-black bangs of hair, you carefully shake her hand.","","    \"Don't worry, I won't bite. My name is Mila\" She smiles sweetly at you, her blue eyes scanning your face carefully. \"Fortunately for us the 'mad season' begins next month, so\u2026 we have an opportunity to make use of the hotel facilities until then.\"","    *temp spoken false","    *label hotel_choices","    *choice","        *hide_reuse #So we're not skiing?","            \"Oh we will get around to skiing in due course, but to be able to ski at our best, we need to train the [i]body[/i] and the [i]mind[/i]. To create a synergy of effort and purpose, and this means we must be able to get into that mindset where we feel comfortable and at ease\u2026 with your other clubmates, and with yourself.\" The spiel rolled off her rouged lips effortlessly.","","            \"As this is your first session, and the other athletes already know each other quite well\u2026\" she gestured with an open palm towards the hotel's dining room, \"we thought it would be good for you to meet them all in more comfortable surroundings.\"","            *if not(spoken)","                *set spoken true","                *goto hotel_choices","        *hide_reuse #What are the facilities?","            She opens her arms out as if surrendering, \"Everything you see around you, there is a pool, gym, sauna, in-house physiologist, wellness rooms and fitness studio\u2026 I could go on, really, a meditation chamber, a salination therapy suite\u2026\" She returns her hands to a light clasp in front of her.","","            \"There is quite simply everything you might need, and just in case you were unaware. The resort above us is [i]outstanding[/i], and will provide the finest snow conditions once the slopes open.\"","            *if not(spoken)","                *set spoken true","                *goto hotel_choices","","    You nod sagely taking it all in.","","    \"Shall we meet the other athletes?\" She gestures for you to lead the way to the dining rooms. You set off ahead but she quickly catches up to walk beside you.","","    \"Are you the instructor? I thought it was someone called Romuld?\" The thought had been in the back of your mind earlier, as you remember your parents talking about him at home whilst they were doing some background research on the club.","","    \"Ah yes. Mr Hvargost won't be joining us today, but do not worry he just has some other business to attend to abroad, and will be here in a week or two. Until then it will just be me, I hope you are not too disappointed?\"","","    *choice","        #No of course not, I was just wondering","            You flash her a reassuring smile, which she returns as you continue walking.","","            \"Mr Hvargost, is a [i]very new[/i] addition to the Snowstyle Club. Once we start on the slopes you'll find we rotate instructors between the different branches, but I will be the permanent coach for this particular branch. We like to give our athletes a wide variety of instruction styles, to cater for all and optimise pathways to success.\"","        #I suppose that depends on your skill at tuition","            \"Oh. I see.\" Mila's eyes open wide at your brazeness, whilst stifling a little chuckle. She was finding it hard to be truly offended by little children.","","            \"Well\u2026 I have been a ski instructor for seven years, was one of the youngest ever to complete the course, and I have a cupboard full of medals and trophies at home.\" She leans conspiratorially closer, \"Last season I won gold in the Regional Ski Masters Cup.\"","","            She watches you out of the corner of her eye as your jaw drops open to mouth a silent \"whoah\".","        #A little, I was hoping to meet him","            You cast your gaze down looking slightly forlorn. But you pick your head up again and take a breath. \"I suppose if he really is as good as they say, he must be in very high demand\u2026\"","","            \"Well, yes. Exactly.\" Mila smiles to herself. \"Until then. You have all the other talented coaches. We like to rotate instructors between the different branches of Snowstyle, but each branch also has a permanent coach. For this particular branch, that would be me.\"","","    You reach the dining room doors which open automatically to reveal a subtly lit array of tables and booths, and off to one side, a bar filled with glassware. Chandeliers seemed to levitate above the mostly empty tables, and other than a soft hum of private conversations, mellow jazz seems to fill the space.","","    The booth with the rest of your clubmates is next to the windows. On one side a pair of stylishly-dressed teenagers are busy taking selfies together, a boy and a girl, they don't seem to notice you arrive as they giggle at the photos of the faces they pulled and whatever filter they had applied. On the other side of the table sat three others in ascending order of height, and presumably age, chatting amongst themselves and taking sips of hot chocolate with cream. They stop to look at you as you draw up to the booth.","","    \"The eldest two are Sanah and Jake, and over here we have Kate, Vivienne, and Xavier\" Mila introduces you. Each offers you a wave, except Xavier who stands and offers his hand.","","    \"So everyone, this is $!{player_name}. Welcome to the club.\"","","    Unsure of quite what to say to the sea of eyes washing over you, Xavier rescues you by taking your hand, \"Come with me, I'll show you around.\"","    ","    *page_break","","    Xavier heads over to the bar area before releasing his grip on your hand. It hadn't been a particularly forceful grip, and you could have stood your ground, but you had felt compelled to follow him anyway. He checks over your shoulder to ensure the others are out of earshot.","","    \"You and I will be rivals.\" He says, which was a little bit more dramatic than you had expected for a first introduction.","","    \"Rivals? What do you mean?\" Unsure of quite what he was talking about, and doubly unsure whether you should have let him lead you away.","","    \"I mean, Snowstyle pairs everyone in a 'buddy' system. We will be expected to do most things together in training, and to try to beat each other in everything.\" He pauses, and straightens the sleeves on his white shirt. \"Constant competition.\"","","    \"So, we'll be training partners?\" You're pretty sure you knew what he had said, but not completely sure what he had meant. Xavier was checking the buttons on his black waistcoat. You thought it would have made him look like a waiter, only the silky fabric looked far too elegant. And the fact he was the same age as you.","","    \"Partners?\u2026 That will depend on whether you can challenge me sufficiently.\" He regards your expression carefully. \"I'm not trying to scare you. I'm just trying to let you know that [i]reputation[/i] is just as important as ability.\"","","    He starts walking back towards the lobby, \"Come, let's give you the tour. It's easy to get lost in the hotel, but it doesn't reflect very well if lost children are asking for directions. It makes you look like you don't belong\u2026\"","","    You keep pace beside him, until Xavier reaches the door, where he stops just before the automatic sensor would pick up his presence.","","    \"Oh, and one other thing\u2026\" He looks you up and down. \"This season's colours are black and white.\"","    ","*elseif (player_clubcode = \"CCC\")","    Carly's ski shop is set back off the main road, which provides sufficient parking for her customers to drop off equipment for repair or pick up hire gear. There is certainly not enough space for the vehicles of a dozen children. Luckily you had arrived early so could sit back and watch as parents did drive-by drop-offs, pulling over onto the pavement, kids tumbling out the back seat with kit bags and skis, before a quick wave and the vehicle rejoined the stream of traffic.","","    Carly emerged from the shop and with an exuberant double handed wave and ushered the assembled mass of kids inside. You took your cue and followed them in.","","    *page_break","","    Most of the others already had a pair of skis and boots, and were wearing matching orange and black jackets, which you assumed were the club's signature colours. It took a moment to realise that the orange pattern was not random, but actually a stylised stick-man-skier tracing a long curving letter-'C' which wrapped from front to back.","","    \"Ok, so for those of you just joining us,\" Carly begins as she fiddles with her phone and a wire connected to the shop's speaker system. \"Today is our pre-ski-prep-day! No-one wants to be on the slope with slooooow skis do they?\"","","    The seasoned kids all respond in near unison, \"No way! Miss Carly!\"","","    \"So what are we going to do!?\" Carly is now scrolling through her phone to find a playlist, whilst simultaneously engaging everyone with a smile and ferreting around in a drawer for something.","","    \"Wax 'em to the maximum!\" Comes the loud response. The music comes on, a little too loud at first, but she turns it down a notch so she can still be heard.","","    She pairs the younger kids with the older ones, and whilst she is sharpening skis on the grinder, you are shown the different types of waxes, and how to apply them by Freida, who you guess is roughly twice your age. She asks you if you have any questions\u2026","    *label ski_wax_choices","    *choice","        *hide_reuse #Why are we waxing the skis?","            \"Well, its like, for protecting them against damp, like you put on a coat to keep yourself warm and dry. Well, the wax protects the base, this is the ski-base,\" she points to the underside of the ski. \"It also helps make it smoother so you can go faster.\"","","            She strokes the base of a ski and invites you to do the same. \"Feels pretty smooth doesn't it.\"","","            You look up into her lightly freckled face and nod in reply.","","            \"And we've not even waxed it yet!\" She giggles, \"All these tiny scratches need to get smoothed out, and filled in. You probably didn't know, but snow and ice is rougher than you think.\"","","            Anything else you want to know?","            *goto ski_wax_choices","        *hide_reuse #What are the different types of ski-wax?","            \"Oh, look at you interested in the technical stuff.\" She smiles at you, \"Erm, there's lots of different types for different snow conditions and temperatures, but here we just have this one.\" She points to a block of pinky-red wax, which reminds you of an extra large bar of soap.","","            \"The only other type we use is this liquid wax, which we can just smear on really quick and easily, which is good for like, before training or races or something. This solid wax we have to melt on, but it's a lot more durable, so it lasts longer.\" She checks your expression to make sure you've understood.","","            Anything else you want to know?","            *goto ski_wax_choices","        *hide_reuse #Why are we doing this?","            Freida chuckles at the question, and makes a face at you, \"Cos we're not lazy!\"","","            She hands you lump of wax and shows you how to use the iron to drip the wax over the ski base. \"It's easier than you think, just be careful with the iron, not to burn yourself.\" She watches you carefully, and as you are drizzling a ski with a shrinking piece of red wax, she returns to the question.","","            \"Carly always reminds us, not everyone is going to be a champion. Matter of fact. So if you want to work in skiing when you're older it's a good idea to have some other tricks up your sleeve.\"","","            You nod sagely as you reach the end of the ski. Freida takes the iron from you and slowly but smoothly passes the iron over the length of the ski remelting the wax and spreading it evenly into the base. Mesmerising.","","            Anything else you want to know?","            *goto ski_wax_choices","        *hide_reuse #How do you like the club?","            \"Me? Oh, I love it here.\" Freida says wistfully looking around the group. \"How old are you?\" She asks.","","            \"Seven.\" You reply.","","            \"Same age as me when I started skiing. But I only joined Carly's club three years ago, when I was eleven, mainly 'cos she had only just started it, so I couldn't before, but also my old club was just getting really competitive, and they were wanting us to train so much, and I had other school work and other stuff going on as well, so I just wanted to actually [i]enjoy[/i] skiing again. Y'know?\"","","            You are smiling and nodding, and you assume the question was rhetorical. She puts a hand on your shoulder and looks you in the eyes, \"If you're nervous or anything, don't worry we're all cool here. You'll enjoy it.\"","","            Anything else you want to know?","            *goto ski_wax_choices","        #No questions","            \"Ok\" Says Freida. She then proceeds to talk, almost endlessly about a K-Pop band you have never heard of, and how she and her sister had been to see them in the summer.","","            For the remainder of the session, you finish waxing the skis, Carly explains something about edge angles and how to adjust the bindings for different skiers, but you weren't really able to quite get your head around it.","            ","            Then there was a short dance competition.","","            Everyone left in high spirits, and you couldn't wait to go to the next training session.","*else","    *bug A club should have been chosen but hasn't!","","*gosub_scene util q_process 3","*page_break The following day","*return"], "labels":{"club_meet":196,"choose_club":280,"are_you_sure":318,"name_choice":412,"surname_choice":459,"borrow_choice":531,"hotel_choices":636,"ski_wax_choices":725}},
"text_7": {"crc":-1006842116, "lines":["*label start","*if (player_clubcode != \"RCK\") and ((player_clubcode != \"CSC\") and ((player_clubcode != \"CCC\") and (player_clubcode != \"SSC\")))","    *bug Player clubcode not recognised: ${player_clubcode}","","*comment -- TODO - set training total to the actual number of possible training sessions!","*set training_total 0","*set player_tng 0","*gosub_scene career_manager training_queue_fill","","*if (is_test)","    *set player_clubcode \"SSC\"","","[b]Chapter 1 - YOUR FIRST SEASON[/b]","","*gosub {player_clubcode}","","*comment *gosub_scene calc apply_training \"${player_code}\"","","*return","","*comment -- [[ START OF TEXTS ]]---------------------------------------------------------------------------","*comment -- KEY CHOICES - natural ability, ","*comment -- at end of chapter train player and push player stats into cont_competitors","","*label RCK","Season 1 with Racing Kids. - TODO","*return","","*label CSC","Season 1 with Community Sports Club. - TODO","*return","","*label CCC","Season 1 with Carly's Carvers Ski Club. - TODO","*return","","*label SSC","*temp viv_laugh 0","*temp xav_notes 0","You arrive at the next session with Snowstyle dressed more fittingly than before. Xavier gives you a cursory glance over your attire, but says nothing.","","He was sat on a low stone wall next to Vivienne who idly rocked her feet on the heel of the boots, whilst Xavier was sat bolt upright staring straight ahead.","","\"Hi.\" You say stopping in front of them.","","Vivienne responds flatly, lolling her head to one side, \"Hi. Nice jacket.\"","","\"Thanks\u2014\" You start to say, but before you can return the compliment, Xavier interrupts you.","","\"Good evening, ${player_name}. I hope you are feeling well rested.\" Still statuesque in his posture, but his gaze has shifted to you.","","*choice","    #I am yes, thanks for asking","        \"Good.\" Xavier nods his head once for emphasis. \"Then today I hope I won't need to babysit you.\"","","        \"What?\" Your eyebrow raise should have spoken volumes. But it didn't. Not to Xavier.","","        \"'I beg your pardon', is how we ask politely. [i]'Watt'[/i] was the inventor of the lightbulb.\"","","        Now it was Vivienne's turn to raise an eyebrow. \"No he wasn't.\"","","        Xavier looked slightly taken aback, but quickly regained his composure. \"Well, it hardly matters, his name is on all of them\u2014\"","        ","        Vivienne's peel of laughter rang out in the cool evening air, doubling over comically, she nearly fell off the wall.","        *gosub_scene util insert \"cont_storytags\" \"\" \"viv_laugh\" \"2\"","        *set viv_laugh 2","    #My legs still ache","        \"Don't worry, you'll get used to it. It takes a few weeks to really grasp the basics.\" Xavier's voice held a certain satisfaction, and a little smile was being suppressed at the corner of his mouth.","        ","        But then Vivienne snorted. \"Sorry.\" She held her hand up to cover her mouth, trying badly to cover up her far more expressive smirk. Xavier went back to staring straight ahead. The smile had vanished. Vivienne was starting to break out into a giggle.","","        \"What's so funny? I've been training for years.\" He asks, shooting her a dark look, before regaining his composure.","","        \"I dunno\u2026 It's just. Funny.\" Her giggle was evolving into poorly suppressed laughter. \"Now I've started I can't stop.\"","        *gosub_scene util insert \"cont_storytags\" \"\" \"viv_laugh\" \"1\"","        *set viv_laugh 1","    #Why are you sat like that?","        \"I don't understand.\" Bafflement clouds Xavier's face.","","        \"Do you mean, why is he sat like a statue on the toilet\u2014 bah haha!!\" Vivienne bursts out laughing so hard, she slips off the wall and starts rolling on the floor.","","        \"I'm\u2014\" she gulps down air between spasms of laughter. She can barely speak properly, and upon seeing Xavier's face in a furious frown, she abandons whatever it was she had been trying to say and guffaws once more.","        *gosub_scene util insert \"cont_storytags\" \"\" \"viv_laugh\" \"3\"","        *set viv_laugh 3","","She was not seriously trying to control her glee, but to make a show of it she grabbed one of her pair of long red braids and bit down on it.","","Suddenly a voice startles you from behind. @{(is_panicky) You jump in the air despite the ski boots weighing you down, and then land awkwardly because of them.|}","","\"Good evening children.\" Mila is beaming, and obviously impressed at how smart the group look dressed completely in black and white. Her own fitted white ski suit has a black belt and vertical accents at the trouser and arm cuffs. You hadn't noticed her approach, but now she stood beside you all looking perplexed as to what had sent Vivienne into a comic coma.","","\"Nice to see you all getting along. What is the matter with Viv?\"","","*choice","    #Viv was making fun of Xavier","        Viv stops laughing and gives Mila a worried look, \"No I wasn't! Xavier was just being funny, and I was laughing!\"","","        Mila's hands were on her hips and her face stern, she looked at each of you in turn, and it felt for a second like she could read each of your minds.","","        \"Well, I would like it if you could all get along. Xavier, was Viv making fun of you?\" She asks, her face serious.","","        Xavier had not really altered his composure during the brief exchange, and decided he wasn't going to now. \"Of course not, I'm just really good at telling jokes. $!{player_name} probably just didn't understand it.\"","","        Viv glances over to Xavier, then back to Mila and gives her a smile.","","        \"Hmmm, ok then.\" Mila says squinting slightly at them.","        *gosub_scene util insert \"cont_storytags\" \"\" \"xav_notes\" \"1\"","        *set xav_notes 1","    #Viv was just telling jokes","        Viv manages to calm herself, \"Yeah really funny jokes.\"","","        \"I didn't say they were good jokes.\" You point out.","","        \"I see, well I don't think you're supposed to laugh at your own jokes Viv, and no-one else is laughing.\"","","        Viv's face falls, and she rolls her eyes. Xavier on the other hand has raised an eyebrow at you.","        *gosub_scene util insert \"cont_storytags\" \"\" \"xav_notes\" \"3\"","        *set xav_notes 3","    #Viv is crazy","        \"Hey!\" Viv shouts out, clearly offended.","","        \"Well I would prefer it if we didn't call each other names. So $!{player_name}, please tell Viv you are sorry for calling her 'crazy'.\" Mila's stern gaze falls on you, and under the stare of her piercing blue eyes you crack like dry pasta.","","        \"I'm sorry for calling you crazy Vivienne.\" You mutter. Viv seems mollified but you also notice Xavier's smirk has returned.","","        \"Thank you ${player_name}.\" Mila says appreciatively.","        *gosub_scene util insert \"cont_storytags\" \"\" \"xav_notes\" \"2\"","        *set xav_notes 2","","Before the conversation can continue any further, Sanah and Jake join the group, speaking almost in unison \"Hi, we're here!\"","","Distracted from her train of thought Mila defaults to getting the lesson started, \"Ok, good.\"","","She pulls out a pair of black gloves that had been tucked under the belt and slaps them into her hand.","","\"Right, Kate's not coming training today. So now that we have all arrived, shall we make our way to the gondola?\"","","The children pick up their skis and poles and walk in pairs to the lift station. You find Xavier by your side as you reach for your equipment. He watches you impatiently as you struggle to wrap your arms around the skis and balance everything. Rolling his eyes, he starts marching off. Suddenly Mila appears in front of you.","","\"Like this.\" She demonstrates her grip on the ski-bindings with one hand, and the poles held neatly together in the other. You copy he
