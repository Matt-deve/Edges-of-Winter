r hand position and she nods her approval. The position feels so much more stable than whatever you had been trying to do, although the combined weight of the skis in one hand wasn't the most comfortable. The boots still feeling heavy and clumsy on your feet, your stuttering gait on the gritted brickwork walkway drew more attention from Mila.","","\"Step slightly shorter, so your don't over extend your leg.\"","","You comply with her advice, and find the unforgiving heel strikes yielded into a slightly more graceful movement. That is to say of course, as graceful as one could be in ski boots.","","*page_break","","Eventually you arrive at the gondola. Xavier scans his ski pass at the gate and steps through.","","\"You're already behind. You have a lot of catching up to do.\" Xavier says from the other side of the gate.","","Mila's pass beeps as she steps through the gate next to you. \"We don't win races by looking back Xavier.\" Her tone is gentle, but sincere, and it snaps Xavier's focus back onto the approaching gondola. She beckons for you to pass through the gate, and as your card beeps, the turnstile clanks around, and you step through to the other side, you feel your stomach flutter. Almost as if this first step was the beginning of a marathon, one which others had already started running.","","*page_break Going up\u2026","","The gondola ride was eerily quiet. Something about being in a confined space with strangers all of a sudden put everyone into an insular mood. Mila was taking the time to type out a number of texts back and forth to someone. Each ping on her phone meant a new message had arrived, a little smile crept into the corner of her lips, and she would again begin furiously tapping away with her thumbs on the touchscreen.","","The view was amazing, although the other children seemed content to look at the diamond plate floor, it was all new to you. The sun had already passed behind the mountains leaving the whole valley in their shadow, but the clouds burned red and amber against the blue. The snow seemed bright, and in the center of the resort took on the various neon hues. The hillsides looked like static from an old television as the dark pine peeked through the white quilt.","","Taking it all in, you don't even notice the gondola station approaching until the gondola makes a sudden jolt. Your co-passengers prepare to disembark.","","As you pass through the narrow doorway, Xavier barges in front of you.","*choice","    #Hey! I'm walking here!","        \"Hey! I'm walking here!\" You shout.","","        *if (xav_notes = 1)","            \"Not anymore you're not.\" Retorts Xavier.","","            You shuffle through after him, trying not to lose your balance navigating the narrow moving doorway. He already has his skis under his arm and is striding away, much more easily on the softer snow than on solid concrete. You start to follow him, but then realise you don't have your skis. Spinning around, you quickly grab them from the exterior of the gondola's door just before they start to make their way back down the mountain.","","            You rush to catch up with the others, but then notice Viv had been watching you from a short distance away.","","            She sticks her tongue out at you and then runs off ahead.","","        *elseif (xav_notes = 2)","            Xavier says nothing, but once outside picks your skis up off the rack and hands them to you as leave.","","            \"Uh\u2026 thanks.\" You say, unsure whether this was his way of apologising.","","            \"No problem. I wouldn't want you to make too hasty an opinion of me.\" He shrugs, and turns to catch up with the others.","","            \"'Too hasty an opinion'?\" You parrot back.","","            \"Nevermind, we should catch up, you've already had one reprimand today, which isn't a good start.\"","        *else","            \"Huh.\" He says, casting a critical eye over you, before clearing the slowly moving doorway.","","            You shuffle over to the doorway and step through trying not to lose your balance.","","            \"What is 'huh' supposed to mean?\" You ask him outright.","","            He lifts his skis from the exterior of the gondola's doors, and then reaches for yours before they disappear back down the mountain.","","            \"Nothing. It's just you were clever handling Viv earlier. But now you seem\u2026 less so.\" He shrugs, still holding your skis in front of you.","","    #Sorry, of course after you [i](deferential)[/i]","        \"Sorry, of course, after you.\" You step back to give him room.","","        *if (xav_notes = 1)","            Xavier exits the gondola through the narrow moving doorway and scoops up his skis from the exterior of the gondola's doors. You see his eyes roll as you step through, trying to maintain your balance.","","            He grabs your skis and holds them out for you as you steady yourself.","","            \"Come on.\" He barks and marches off, more easily now on the softer snow than on the solid concrete.","","            You set off after him, then notice Viv had been watching from a short distance away. Her face looks like she had just smelt something bad. As soon as she realises you have seen her, she turns and runs off ahead.","","        *elseif (xav_notes = 2)","            \"You are certainly interesting.\" Xavier remarks as he exits the gondola. You follow him through the narrow moving portal.","","            \"What do you mean by that exactly?\" You enquire.","","            \"If I must explain it. One moment you're calling people crazy, the next you're stepping aside when I clearly barged in. It's somewhat inconsistent.\"","","            \"Well I\u2026\" You struggle to explain yourself. Whilst you ponder, Xavier hands you your skis.","","            \"No matter, it doesn't do me any harm. It's just interesting is all.\"","","            You walk to catch up with the others together.","        *else","            \"Clever and courteous.\" Xavier remarks stepping through the moving portal. \"Hard to believe you go to the public school.\"","","            \"Uh\u2026 I. What?\" Stepping through the narrow moving doorway of the gondola had thrown you slightly off balance, as had Xavier's comment.","","            \"Oh, it's just that you handled the situation with Viv early very diplomatically and now you're showing respect to the more experienced members.\" He plucked your skis, and his own, from the exterior of the gondola's door. \"Don't worry it's a good thing.\"","","            He held your skis out to you, a slight upturning on the corners of his mouth. You take the skis from him and walk side by side to join the others.","","    #Sorry, of course after you [i](sarcastic)[/i]","        \"Sorry, of course, after you.\" You give a dramatic sweeping gesture with your arm.","","        *if (xav_notes = 1)","            Xavier says nothing as he exits the gondola. Doesn't even look at you as he takes his skis from the exterior of the gondola's door. He even dramatically marches off overtaking some of the others.","","            As you step unsteadily from the gondola's narrow moving doorway, Viv is stood off to one side grinning.","","            \"I like you.\" Viv giggles. Then her expression suddenly changes to a serious looking frown with a pout, \"Just don't tell on me again!\"","","            It only lasted a moment, and before you had chance to think of a response, her face was softening again, a grin slowly spreading across her face. You follow her gaze just over your shoulder\u2026","","            Your skis! You dash back to the gondola and hoist them from the door just before it begins its descent back down the mountain. You fall backwards to the sound of Viv's bellow of laughter.","","            Standing up you disentangle yourself from the mess of poles and skis and make your way to join the others. Viv follows behind you finding it difficult to walk whilst holding her sides.","","        *elseif (xav_notes = 2)","            Xavier steps from the moving gondola and lifts the skis from the exterior of the gondola's door.","","            \"Sorry.\" He says. \"It probably was a little hasty of me.\"","","            He offers you your skis, with a slightly sheepish look on his face. \"I can tell you aren't going to be a pushover.\"","","            You take the skis from him, and give him a quizzical look. \"Why would I be?\"","","            \"Oh no. I didn't know [i]what[/i] to expect.\" Xavier shrugs, \"I just hope we can keep our competition civil.\"","","            \"Erm\u2026 sure?\" You say, unsure how else to respond. You walk over to join the others together.","        *else","            \"You are certainly interesting.\" Xavier remarks as he exits the gondola. You follow him through the narrow moving portal.","","            \"What do you mean by that exactly?\" You enquire.","","            \"If I must explain it. Earlier, you handled Viv very well, but now you're being rude. It's somewhat inconsistent.\"","","            \"You're the one who barged in!?\" You snap back.","","            Xavier considers this for a moment, but says nothing. He plucks the pairs of skis from the exterior of the gondola's door, and hands you your pair.","","            \"We should catch up with the others.\" He says.","","    #Say nothing but glare evilly into his back","        \"\u2026\" You don't need to speak, he must be able to feel the burning sensation of your gaze even through his shiny black ski helmet.","","        *if (xav_notes = 1)","            Xavier says nothing as he exits the gondola. Doesn't even look at you as he takes his skis from the exterior of the gondola's door. He even dramatically marches off overtaking some of the others.","","            As you step unsteadily from the gondola's narrow moving doorway, Viv is stood off to one side grinning.","","            \"Wow, and I thought I did evil looks.\" She says, \"Like this.\" Her expression changes to a serious looking frown with a pout, her pale blue eyes seem to narrow and darken, \"Don't tell on me again!\"","","            You step back, almost shocked at the sudden change. Her face then suddenly snaps back into an amiable grin, and she says in a sing-song rhythm, \"Don't foget your skis!\"","","            You turn around to see your pair of skis still in the rack on the exterior of the gondola's doors. You leap to grab them and yank them from their socket just before the gondola begins its descent back down the mountain. The momentum carries you backwards to the ground. Viv's squeal of laughter is all you can hear as you stare up into the dark blue sky.","","            Standing up you disentangle yourself from the mess of poles and skis and make your way to join the others. Viv follows behind you finding it difficult to walk whilst holding her sides.","","        *elseif (xav_notes = 2)","            Xavier steps from the moving gondola and lifts the skis from the exterior of the gondola's door.","","            \"Sorry.\" He says. \"It probably was a little hasty of me to push in like that.\"","","            He offers you your skis, which you take with a gracious smile. Xavier moves off to join the others, which is when you notice Viv watching from a short distance away, her mouth slightly open.","","            As you catch up to her she speaks to you. \"I saw that stare.\" Her eyes as wide as her mouth. \"And you're the one who called [i]me[/i] crazy.\"","","            She laughs at you then runs off ahead.","        *else","            Xavier steps from the moving gondola and lifts the skis from the exterior of the gondola's door.","","            \"Sorry.\" He says. \"It probably was a little hasty of me to push in like that.\"","","            He offers you your skis, which you take with a gracious smile. As you both turn to leave you notice Viv watching a short distance away, her mouth slightly open, and her eyes just as wide.","","            You both walk past her, her eyes following your every movement. She doesn't say anything, but you hear the crunch of her footsteps following you both.","","","*comment -- TODO - segue into lift engine - TODO - customise lift engine","","*comment -- TODO - build up to training segment","*gosub train_engine","","*comment -- TODO - use lift engine again??","","*comment -- TODO - last run down some descriptive ski training - Xav and Viv competing with/for you on slopes","","*comment -- TODO - post training segment","*comment -- TODO - should create mini resolution with Xavier and Viv attitude toward you to be saved to container for future interactions","","","*comment -- archive - archive - archive - archive - archive - archive - archive - archive - archive - archive - archive - archive","You wait with Xavier at the bottom of the slope whilst the others pack the minibus.","","\"Tired?\" Xavier asks out of nowhere.","","\"Not too much.\" You respond. \"You?\"","","\"No of course not. I've been doing this for a year already, I'm pretty used to it by now.\" He folds his arms, but then unfolds them again, and seems unsure what to do with them after that.","","\"I wouldn't be surprised if you were tired though. It was your first training session after all.\"","","You look over to the mini-van and wonder when the others will have finished packing so you can all climb aboard. \"Well. I suppose my shins ache a little.\"","","\"Don't worry,\" Xavier gives you a satisfied smile, \"you'll get used to it. It's one of those things [i]beginners[/i] always complain about.\"","","You turn to give him a look, but before you can respond Mila gives a shout for everyone to embark.","","Xavier sidles into one of the two front seats with one of the older kids, whilst you find yourself crammed into one of the back seats next to Sanah and Jake, who both seem far more interested in themselves right now, than making idle chit-chat.","","*page_break Maybe a nap would be good after all","","","","","","","","*page_break","","After training Xavier catches up to you.","*gosub_scene util remove \"cont_storytags\" \"viv_laugh\"","*temp viv_laugh returnData","*gosub_scene util remove \"cont_storytags\" \"xav_notes\"","*temp xav_notes returnData","*if (is_test)","    *set viv_laugh 1","","*if (xav_notes = 1)","    \"Earlier, when Viv was laughing. Don't do that again. If she's being silly, let [i]her[/i] be silly. Not make it look like I'm the one who has a reason to be laughed at.\" Xavier snaps at you.","","    Your face drops in a disappointed surprise, \"Sorry, I just thought\u2014\"","","    \"Thought? Not quite hard enough. Stop trying to score points over me. @{(viv_laugh) She wasn't even really laughing, you totally over-reacted!|So what if she was laughing, no need to make me out to be the target!|[i]She[/i] was the one in hysterics on the floor looking like a fool, yet you turned it round on to me!?}\" His brow is crinkled and his eyebrows have nearly met in the middle, as he glares at you.","","*elseif (xav_notes = 2)","    *comment -- TODO","*else","    *comment -- TODO","He straightens up and composes himself. \"I need you to compete with me [i]on the slope[/i], not in the playground.\"","","Marching past you, skis held aloft, boots clipping on the tarmac, in his black snowsuit with white epaulettes, chevrons and helmet. From the front it had seemed elegant and distinguished, but now in the glare of the parking lot's floodlights, it seemed overtly serious.","","*comment -- - archive - archive - archive - archive - archive - archive - archive - archive - archive - archive - archive","*page_break","*return","","","*comment -- [[ LIFT ENGINE ]] --TODO Refactor for text 7----------------------------------------","*comment -- 7 year old should focus on silly things - all new and shiny - WOW!","*label lift_engine","","*comment -- TODO -- can pull slope data about lifts to determine some descriptive elements. set view image etc","","What do you do on the ${slope_lifts}@{(slope_lifts = \"gondola\") ?| lift?}","*choice","    #I socialise with my clubmates","        You chit-chat, tell each other jokes, point out other skiers who have fallen over, and swap stories.","    #I try to learn from watching others","        You try to spot the skiers who exhibit good technique, and make mental notes on what they are doing.","    #I admire the view","        *comment -- TODO -- insert image here!","        [i][[A PICTURESQUE SCENE - Pine clad mountains blanketed in snow.]][/i]","    #I rest my eyes","        The gentle clanking of the lift machinery whirs rhythmically in the background. ","        ","        You appreciate the rest. Feeling more focussed and relaxed you are ready to train again.","        *set player_foc +5","        *if(player_foc > 100)","            *set player_foc 100","","*page_break You reach the top","*return","","","","*comment -- [[ TRAIN ENGINE ]] -----------------------------------------","*comment -- 7 year old training selects between athleticism and intellect","*label train_engine","","Your current skills in skiing are not very well developed, and so $!{club_inst} has been observing you carefully to understand your natural abilities and inclinations. This won't define you, but will influence how your stats develop in all future training.","","One thing they have noticed though is your natural\u2026","","*choice","    #Athleticism","        *set player_nat \"athleticism\"","        Despite your lack of experience you are fairly steady on your feet, absorbing the bumps and turns without too much difficulty. The weight of the boot and ski can also feel cumbersome at first for most, yet you have been able to manipulate them with relative ease, and be able to do so over the course of the whole session.","","        You are however, a little more hesitant to push beyond your comfort zone, and learning new techniques hasn't come fluidly. Perhaps because of this you also prefer to power through a move instead of taking the easier but more technical line, although it may be simply that you hadn't even seen it.","","        Overall, $!{club_inst} is impressed by your performance.","    #Intellect","        *set player_nat \"intellect\"","        Despite your lack of experience you are remarkably confident, learning the techniques quickly, and applying them more readily than might be expected. Beginners often struggle with understanding the difference between the fall line and the slope direction, and how to orient the skis to achieve the desired direction of travel, but to you it came more naturally.","","        You are however, more tired after the training, and struggled more with energetic moves. You also fell over a few times, which is perfectly normal for beginners, perhaps your confidence meant you were pushing your comfort zone a little more, although it may simply be your sense of balance needs improving.","","        Overall, $!{club_inst} is impressed by your performance.","","*page_break","*return"], "labels":{"start":0,"rck":24,"csc":28,"ccc":32,"ssc":36,"lift_engine":378,"train_engine":406}},

"text_features": {"crc":1575041321, "lines":["*gosub get_feature \"ev_verticals\"","*gosub get_event \"a\" false","","*comment -- [[  GET EVENT  ]] -------------------------------------------------","*comment -- locate and present a choice block to the player using the passed event reference, or return a standard value for NPC judgement assessment","*comment -- TODO - rewriting as pre chosen events (which still vary to conditions) but allow npcs to be put through the choices as well -  this requires a judgement decision to be made from the com judgement if not a player, the choice is bypassed via labels but the conditions still run and amend the race-speed or return values accordingly - use multireplace or if-blocks on all option texts to @{(is_player) Text for the player|Potentially some notable text of you observing them, crashes etc might be noteworthy.}","","*comment -- TODO - then assess race_control (above 0 good, otherwise crash out) affected by focus, strategy, prep, speed, con/tek, bal, sta, etc to see if control is lost.","","*comment -- GET FEATURE - Returns a description text based on player's focus and prep--------","*label get_feature","*params feat_ref","","*gosub {feat_ref}","","*return","","*comment -- GET EVENT - Returns a sequence of choices and a race_speed modifier--------------","*label get_event","*params ev_ref is_player","","*comment -- parse event ref and init return values","*set ev_ref \"ev_\"&ev_ref","*set returnVal 1","*set returnData \"\"","","*if (is_player)","    *gosub show_preamble","","    *gosub {ev_ref}","","*else","    *comment -- return if start or end events (for player only)","    *if (ev_ref = \"ev_start\") or (ev_ref = \"ev_end\")","        *return","    *comment -- TODO - may need refactor to fit - judgement assessment needs to take place in here to finish setting the gosub call correctly","    *temp i 0","    *temp j","    *label judge_loop","    *if (i != 3)","        *set i +1","        *rand j 1 100","        *if (j < com_jdg)","            *set ev_ref &\"_${i}\"","        *else","            *goto judge_loop","    *else","        *set ev_ref &\"_3\"","    *gosub {ev_ref}","","*return","","*comment -- SHOW PREAMBLE ----------------------------------------------------------------------","*comment -- TODO - refactor to show a preamble with basic course progress info","*label show_preamble","","*if (race_format = \"SL\")","    *if (race_current_sector = 0)","        You start off down the short course packed with gates to navigate.","    *elseif (race_current_sector = 1)","        Entering the first of the three sectors, you get a better view of the distances between the gates and plot your turns accordingly.","    *elseif (race_current_sector = 2)","        The difficult middle portion of the race, you need to remain vigilant as the change can catch you off guard.","    *elseif (race_current_sector = 3)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight.","    *else","        The last gate cleared! The finish line is almost here!","*elseif (race_format = \"GS\")","    *if (race_current_sector = 0)","        You start off down the course, red and blue gate flags mark your route.","    *elseif (race_current_sector = 1)","        Entering the first of the four sectors, you approach the first gate and make the last minute adjustments to your line.","    *elseif (race_current_sector = 2)","        First quarter down, and straight into the second sector.","    *elseif (race_current_sector = 3)","        Over half way and you are into the third sector, no time for slip-ups.","    *elseif (race_current_sector = 4)","        The final sector, and you can see the finish line just beyond the last few gates.","    *else","        The last gate cleared! The finish line is almost here!","*elseif (race_format = \"SG\")","    *if (race_current_sector = 0)","        You drop into the starting straight, picking up speed immediately.","    *elseif (race_current_sector = 1)","        Entering the first of the five sectors, it is impossible to see beyond the rapidly approaching features.","    *elseif (race_current_sector = 2)","        The difficult middle portion of the race, you need to remain vigilant as the change can catch you off guard.","    *elseif (race_current_sector = 3)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight.","    *elseif (race_current_sector = 4)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight","    *elseif (race_current_sector = 5)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight","    *else","        The last gate cleared! The finish line is almost here!","*elseif (race_format = \"DH\")","    *if (race_current_sector = 0)","        You start off down the short course packed with gates to navigate.","    *elseif (race_current_sector = 1)","        Entering the first of the six sectors, you get a better view of the distances between the gates and plot your turns accordingly.","    *elseif (race_current_sector = 2)","        The difficult middle portion of the race, you need to remain vigilant as the change can catch you off guard.","    *elseif (race_current_sector = 3)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight.","    *elseif (race_current_sector = 4)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight","    *elseif (race_current_sector = 5)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight","    *elseif (race_current_sector = 6)","        The final sector, and potentially a change in feature sequences. Get through this and you're on the final straight","    *else","        The last gate cleared! The finish line is almost here!","","*return","","*comment -- [[ PLAYER ONLY - FEATURE DESCRIPTIONS ]]----------------------------------------","*comment -- Returns focus, stats, and prep modified telegraphing/descriptive texts","","*comment -- EVENT START --------------------------------","*label ev_start","You place your skis under the switch and carefully position your poles over it and ready yourself to begin.","","The radio crackles into life stating your bib number and that simple word telling you that it is now or never\u2026","","*page_break \"GO!\"","*return","","*comment -- EVENT END ----------------------------------","*label ev_end","You make yourself as small and as streamlined as possible as you race from the last gate and over the finish line.","*page_break You finished the race!","*return","","*comment -- VERTICALS - SL ONLY ------------------------------------------------------","*label ev_verticals","","*return","*comment -- FLUSHES - SL ONLY --------------------------------------------------------","*label ev_flushes","","*return","*comment -- OFFSETS - SL ONLY --------------------------------------------------------","*label ev_offsets","","*return","*comment -- HAIRPINS - SL ONLY -------------------------------------------------------","*label ev_hairpins","","*return","*comment -- SPEED - GS/SG/DH ----------------------------------------------------------","*label ev_speed","","A long steeper and straighter section unfurls in front of you.","@{(com_foc > 80) You can see a clear line through the gates all the way to the next sector.|}","@{(com_foc > 60) A good opportunity to pick up some speed.|}","","*if (player_prep_1 = \"check\") or (player_prep_2 = \"check\")","    You are glad you paid some attention to your skis, the extra waxing and polishing will give you a smoother ride. ","","*return","*comment -- GLIDE - SG/DH ----------------------------------------------------------","*label ev_glide","","*return","*comment -- TIGHT - GS ONLY ----------------------------------------------------------","*label ev_tight","","*return","*comment -- SMOOTH - GS/SG ---------------------------------------------------------","*label ev_smooth","","*return","*comment -- JUMP - SG/DH -----------------------------------------------------------","*label ev_jump","","*return","*comment -- ROLLERS - SG/DH --------------------------------------------------------","*label ev_rollers","","*return","*comment -- COMPRESSION - SG/DH ----------------------------------------------------","*label ev_compression","","*return","*comment -- TRAVERSE - GS/SG/DH -------------------------------------------------------","*label ev_traverse","","*return","","","*comment -- [[ EVENTS ]] ---------------------------------------------------------------------","*comment -- Provides event descriptions and choices for the player, and returns a race_speed modifier for all.","","*comment -- TODO - modify stat tests","*comment -- TODO - add more events","*comment -- TODO - update course builder to select from first 10 events when populating events into the sequence","*comment -- TODO - alter race_control","","*comment -- EVENT A - Ice patch on turn -----------------------------------","*label ev_a","A small icy patch approaches right next to the gate flag, but if you can keep your balance in the turn you can skid through it. Going a little wide will slow you down a little and cost you time, but there is less risk of skidding out.","","*choice","    #Try turning on the ice patch at your current speed","        *goto ev_a_3","    #Control speed before the gate and turn on the ice patch","        *goto ev_a_2","    #Go wide of the ice patch","        *goto ev_a_1","*label ev_a_3","*if ((race_speed * 10) > com_ski_con) and (com_bal < (0.9 * float_bal))","    @{(is_player) Oh dear, that's quite a big skid\u2026 and now you're way to low to track back across to the next gate in time.|} ","    *set returnVal 0","    *set returnData \"missed a gate\"","*else","    *if (is_player)","        Wow! You made it through still on your feet, @{(com_ski_con > 90) good job your skis are sharp!|you weren't going quite fast enough to lose control\u2026 this time.}","*return","*label ev_a_2","@{(is_player) You apply a little braking before you reach the gate, and effect the turn admirably. Sure you've lost a little momentum, but at least there is still a chance to finish the race.|}","*set returnVal 0.8","*return","*label ev_a_1","@{(is_player) A slightly longer route around the gate, but you do get to keep most of your momentum and you avoided a skid on the ice.|}","*set returnVal 0.95","*return","","*comment -- EVENT B - Ice patch on straight -----------------------------------","*label ev_b","*temp confid (com_con > float_con)","*temp techni (com_tek > float_tek)","An icy patch approaches between the gates, you don't need to turn on it, so you won't skid, and  it is a chance to pick up some speed@{(race_speed < 10) , which you sorely need.|\u2026} However, going faster than normal into the next turn will depend on your confidence and technique, ","*if(confid) and (techni)","    both of which are higher than average.","*elseif (confid)","    and you are braver than most.","*elseif (techni)","    and you do have good technique.","*else","    which you are a little nervous about.","","*fake_choice","    #Full speed ahead!","        *goto ev_b_1","    #Control your speed over the ice","        *goto ev_b_3","    #Ignore the ice and carry on as normal","        *goto ev_b_2","*label ev_b_1","*if (race_speed < 10)","    @{(is_player) You tuck into a more streamlined position and welcome the extra speed boost as you glide over the ice. Everything still under control you move into the turn without a problem.|}","    *set returnVal 1.1","*elseif (com_con > float_con) and (com_tek > float_tek)","    @{(is_player) You tuck into a more streamlined position and charge straight over the ice and drop into the next turn, feeling like you've picked up a little speed on the way through.|}","    *set returnVal 1.1","*elseif (com_tek > float_tek)","    @{(is_player) You tuck into a more streamlined position and charge straight over the ice, which takes you a little by surprise, although you manage to hold it together to carry through the turn.|}","    *set returnVal 1","*else","    @{(com_con > float_con) Over-confidence|Your lower confidence} got the better of you as you @{(com_con > float_con) speed over the ice|panic on the ice}. With the slight extra speed you start your turn a little later than normal forcing it to be sharper than necessary to pass the gate, thus losing some momentum.","    *set returnVal 0.9","*return","*label ev_b_3","@{(is_player) You apply a little braking over the ice, and move around the gate at a reasonable speed.|}","*set returnVal 0.95","*return","*label ev_b_2","@{(is_player) You figure there is no need to do anything different here and hold your line over the ice and around the next gate.|}","*set returnVal 1","*return","","*comment -- EVENT C - Ice ball --------------------------------------","*label ev_c","*temp ev_c_redir false","*if (com_foc > float_foc)","    You approach a loose ball of ice has rolled onto the course. It's only slightly larger than a tennis ball, but it could still throw you off-balance.","    *choice","        #Aim higher and go around it [i](slightly longer to the next gate)[/i]","            *goto ev_c_1","        #Aim lower and go around it [i](tighter turn to the next gate)[/i]","            *goto ev_c_2","        #Smash through it [i](may lose balance)[/i]","            *set ev_c_redir true","*else","    You come around the gate and \u2014 too late \u2014 you hit something on the course sending you off-balance.","    *label ev_c_redir","    *if (race_speed > 10)","        You hit the ice ball pretty hard and bounce over it, knocking you off-balance.","        *choice","            #Hop to get your feet back under you","                *goto ev_c_2","            #Tuck to lower your center of mass","                *goto ev_c_1","            #Brake to lower your speed","                *goto ev_c_3","    *else","        Your speed wasn't fast enough for your skis to run over it, instead it diverts a ski out of position which causes you to brake slightly, but otherwise, it was nothing serious.","        *goto ev_c_1","","","*label ev_c_1","@{(is_player) The distraction was unwelcome, but you managed to salvage the manouevre as best you could, and sail around the next gate.|}","*set returnVal 0.95","*return","*label ev_c_2","@{(is_player) You end up in the wrong position to pass the gate smoothly. Your shoulder contacts with the hard plastic, but as you wince from the impact you realise you made it through and now you must concentrate as the next gate approaches.|}","*set returnVal 0.85","*return","*label ev_c_3","@{(is_player) Oof! That has cost you a lot of momentum. You make it around the gate, albeit much slower than when you approached.|}","*set returnVal 0.7","*return","","*comment -- EVENT D - Catch an edge --------------------------------------","*label ev_d","You start rolling over your skis as you move onto the next turn \u2014 your inside ski catches on something \u2014 a patch of loose snow? ","*if (race_speed < 5)","    You're not going too fast, but still, there's not much time to think about it.","*else","    At this speed \u2014 there's no time to think about it.","Your ski will be bent out of shape in less than a second and pull you into the slope. You will either recover from this or the race may as well be over.","","*choice","    #Tuck your body to lower your center of gravity","        *goto ev_d_3","    #Shift all your weight to the other ski","        *goto ev_d_1","    #Let it drag","        *goto ev_d_2","","*label ev_d_1","@{(is_player) You lean over slightly more than usual and effortlessly lift the trailing ski free of the snow, and in the same movement replace it where it belongs. All just in time to sail around the next gate.|}","*set returnVal 1","*return","*label ev_d_2","@{(is_player) A pretty risky move! A split second decision has left you attempting to pull off freestyle stunts during a race! You let the ski pull you around as you flatten the other to the slope. You are momentarily travelling backwards down the course as the world revolves around you.|}","*if(com_tek > float_tek)","    *if(race_speed < 5)","        @{(is_player) Your speed was too slow to have the momentum to complete the spin, and it nearly stops you on the course instead. You can keep going and easily pass the gate, but you're almost at a standing start.|}","        *set returnVal 0.1","    *else","        @{(is_player) To a collective gasp from on-lookers, you manage to complete the spin. Your showmanship will cost you some speed, but the prestige is probably worth it.|}","        *if (is_player)","            *page_break This isn't ice dancing y'know\u2026","            *achieve Piroutte","        *set returnVal 0.9","*else","    @{(is_player) The move feels clunky and awkward, and this isn't something you've practiced for. The spin not quite complete leaves you at a weird angle for the next gate. You can recover from this, but you've lost nearly all your speed.|}","    *set returnVal 0.1","*return","*label ev_d_3","@{(is_player) That did not work at all. Your squat posture entrenches the trailing ski [i]even more[/i]. Your skis are now pointing outward in different directions and you are heading straight for the snow's cold embrace. The fall leaves you looking like an unfortunate cartoon character plastered on the piste, spreadeagled, poles askew, and with one ski cautiously skittering away.|}","*if(is_player)","    *set returnVal 0","    *set returnData \"crashed on the course\"","*else","    *if(com_jdg < 50)","        *set returnVal 0","        *set returnData \"crashed on course\"","    *else","        *set returnVal 0.5","*return","","*comment -- Event E - Clip a gate -----------------------------------","*label ev_e","You come around a gate and shift your weight to start building pressure on the new outside ski. The edge begins to bite and you roll into the next turn. It looks perfect.","","Actually, it looks close\u2026 very close, to the next gate\u2026 @{(com_con < float_con) This is going to hurt\u2026|Trophy bruise coming up\u2026}","","*choice","    #Tuck to try and avoid contacting the poles","        *goto ev_e_1","    #Shift your skis a little to widen your turn","        *goto ev_e_2  ","    #Brace with your poles and plough through","        *goto ev_e_3","","*label ev_e_1","@{(is_player) You tuck yourself as small as you can and try to lean out the way of the gate pole. As the tips of your skis pass the pole it becomes pretty obvious you are going to \u2014 the hard plastic slaps your shoulder \u2014 a wince of pain. Your side droops after the impact and your ski pole dangles helplessly from the strap on your wrist. |}","","@{(is_player) You're through. You made it through. No time to celebrate though \u2014 the next turn approaches.|}","*set returnVal 0.97","*return","*label ev_e_2","@{(is_player) There is just enough time to widen your arc through the turn. You shift your skis slightly but this means your weight is a little off-center. You pass the gate just wide enough to avoid impact, but you are forced to make a sharper turn than you were aiming for. A little slower perhaps, but you avoided any injuries.|}","*set returnVal 0.92","*return","*label ev_e_3","*if (com_con < float_con)","    @{(is_player) Oh mother! Your eyes are fixed on the inert object standing in your way. You push your pole out in front of you to shield yourself from the inevitable \u2014 OOF! \u2014 impact\u2026|}","","    @{(is_player) Your arm buckles under the force and the pole slaps across your helmet. Your body mass eventually forces the pole down, but your ears are ringing. Stunned you shake your head, and suddenly realise you are still on your feet and moving for the next gate, albeit more groggily.|}","    *set returnVal 0.6","*else","    @{(is_player) Time to take this plastic post down! You lift your inside pole across your body. Fist clenched tightly in your gloves, the tips of your skis pass it innocently by. Then \u2014 WHAM \u2014 a satisfying crack as ski pole meets gate pole. The gate buckles under the force and vacates the space as you glide smoothly through.|}","    *set returnVal 1","*return","","*comment -- EVENT F - Dip -------------------------------","*label ev_f ","The next gate looks a little further out than normal, then you see why. The ground dips away slightly, obscuring a few metres of the track. How you use this could help you pick up speed, but might also cause a problem timing your turn around the next gate.","*choice","    #Ride through the dip","        *goto ev_f_2","    #Turn through the drop","        *goto ev_f_3","    #Tuck and lean in","        *goto ev_f_1","*label ev_f_1","@{(is_player) You tuck your body into a more streamlined posture. Air whisks past you as you fly through the dip.|}","*if(race_speed > 12)","    @{(is_player) You feel yourself lift off the snow and moments later land back on your skis feeling faster than ever. |}","*elseif (race_speed > 10)","    @{(is_player) You feel gravity catch up with you as your stomach tries to jump up your throat. A second later and you are ready for the next turn feeling faster than ever. |}","*else","    @{(is_player) You skim down the slight slope, and head into the next turn feeling faster than ever. |}","*set returnVal 1.1","*return","*label ev_f_2","@{(is_player) You keep your position and hold yourself steady as you drop down the hidden slope. You emerge ready to initiate the next turn.|}","*set returnVal 1","*return","*label ev_f_3","@{(is_player) You begin a short turn at the top of the dip. Turning counter to the intended direction allows you to cut back across the slope at a perfect angle for the next gate, although it doesn't feel as fast as it could have been.|}","*set returnVal 0.9","*return"], "labels":{"get_feature":10,"get_event":18,"judge_loop":38,"show_preamble":54,"ev_start":119,"ev_end":128,"ev_verticals":134,"ev_flushes":138,"ev_offsets":142,"ev_hairpins":146,"ev_speed":150,"ev_glide":161,"ev_tight":165,"ev_smooth":169,"ev_jump":173,"ev_rollers":177,"ev_compression":181,"ev_traverse":185,"ev_a":199,"ev_a_3":209,"ev_a_2":218,"ev_a_1":222,"ev_b":228,"ev_b_1":248,"ev_b_3":262,"ev_b_2":266,"ev_c":272,"ev_c_redir":285,"ev_c_1":300,"ev_c_2":304,"ev_c_3":308,"ev_d":314,"ev_d_1":330,"ev_d_2":334,"ev_d_3":350,"ev_e":364,"ev_e_1":377,"ev_e_2":383,"ev_e_3":387,"ev_f":399,"ev_f_1":408,"ev_f_2":418,"ev_f_3":422}},
"career_manager": {"crc":546838339, "lines":["","*comment -- Record progress between seasons","*comment -- Unlocks age related options","*comment -- Record relationships with other racers with club members and add new competitors as required when switching levels clubs etc.","*comment -- Records competitors stats and progression","","*label manage","","*comment -- Run Prelude","*gosub_scene text_interlude prelude","*page_break","","*comment -- init career data and run prologue text","*gosub init","*gosub_scene text_prologue","*gosub select_stats","","*page_break Interlude","*gosub_scene text_interlude a_distant_memory","","*comment -- TODO - Start of WIP summary playthrough stats","*if (is_wip)","    [b]END OF WIP CONTENT[/b]","    *page_break Summary","","    Thanks for playing the [i][WIP] Edges of Winter (Skiing Game)[/i]. Please leave feedback on the ","    *link https://forum.choiceofgames.com/t/wip-edges-of-winter-10k/177054 WIP thread.","","","    [b]Story Stat Summary[/b]","    *line_break","    ------------------------------------------","    *line_break","    Backstory index : ${backstory_index}","    *line_break","    Clubcode : ${player_clubcode}","    *line_break","    Wealth : ${wealth}","    *line_break","    ------------------------------------------","","*page_break","*ending","*comment -- TODO - End of WIP summary playthrough stats","","","","*page_break Chapter 1","*comment -- age 7 - foundations - natural inclinations - char intros","*gosub_scene text_7 start","","","","*gosub_scene calc apply_training \"${player_code}\"","*gosub_scene season_coordinator coordinate","","*comment -- TODO - Add in interlude - getting off the mountain","*page_break Interlude","*gosub_scene text_interlude int2","","*comment -- age 11 - skills and talents - chosen focii - char intros + consolidations","*page_break Chapter 2","*gosub_scene text_11 start","*gosub_scene calc apply_training \"${player_code}\"","*gosub_scene season_coordinator coordinate","","*comment -- T   }
}

function safeCall(obj, fn) {
    if (!fn) return;
    var isHeadless = typeof window == "undefined";
    var debug = false || (!isHeadless && window.debug);
    if (isIE || isHeadless) {
        // just call through; onerror will be called and debugger will handle it
        if (typeof MSApp != "undefined") {
            if (obj) {
                MSApp.execUnsafeLocalFunction(function () { fn.call(obj); });
            } else {
                MSApp.execUnsafeLocalFunction(fn);
            }
        } else if (obj) {
            fn.call(obj);
        } else {
            fn.call();
        }
    } else {
        try {
            if (obj) {
                fn.call(obj);
            } else {
                fn.call();
            }
        } catch (e) {
            if (e.message) {
              window.reportError(e.message, e.fileName, e.lineNumber, e.columnNumber, e);
            } else if (e.stack) {
              window.reportError(e.stack, e.fileName, e.lineNumber, e.columnNumber, e);
            } else {
              window.reportError(toJson(e, '\n'));
            }

            if (window.console) {
              window.console.error(e);
              if (e.message) window.console.error("Message: " + e.message);
              if (e.stack) window.console.error("Stack: " + e.stack);
            }
            // Rethrow here so the debugger can handle it
            // On Firefox this causes a second prompt.  Meh!
            if (debug) throw e;
        }
    }
}

function safeCallback(callback) {
  return function() {
    safeCall(null, callback);
  };
}

function safeTimeout(fn, time) {
  setTimeout(function() {
    safeCall(null, fn);
  }, time);
}

function isDefined(x) {
    return "undefined" !== typeof x;

function jsonStringifyAscii(obj) {
  var output = JSON.stringify(obj).replace(/(.)/g, function(x) {
    var code = x.charCodeAt(0);
    if (code > 127 || code < 32) {
     var outCode = code.toString(16);
     switch (outCode.length) {
       case 4:
         return "\\u" + outCode;
       case 3:
         return "\\u0" + outCode;
       case 2:
         return "\\u00" + outCode;
       case 1:
         return "\\u000" + outCode;
       default:
         return x;
     }
    }
    return x;
  });
  return output;
}

function toJson(obj, standardized) {
 if (typeof JSON != "undefined" && JSON.stringify) {
  return jsonStringifyAscii(obj);
 }
 switch (typeof obj) {
  case 'object':
   if (obj) {
    var list = [];
    if (obj instanceof Array) {
     for (var i=0;i < obj.length;i++) {
      list.push(toJson(obj[i], standardized));
     }
     return '[' + list.join(',') + ']';
    } else {
     for (var prop in obj) {
      if (prop == "scene") continue;
      if (!standardized && /^[a-zA-Z][a-zA-Z_0-9]\w+$/.test(prop) && !/\b(abstract|boolean|break|byte|case|catch|char|class|comment|const|continue|debugger|default|delete|do|double|else|enum|export|extends|false|final|finally|float|for|function|goto|if|implements|import|in|instanceof|int|interface|label|long|native|new|null|package|private|protected|public|return|short|static|super|switch|synchronized|this|throws|transient|true|try|typeof|var|void|volatile|while|with)\b/.test(prop)) {
        list.push(prop + ':' + toJson(obj[prop], standardized));
      } else {
        list.push('"' + prop + '":' + toJson(obj[prop], standardized));
      }
     }
     return '{' + list.join(',') + '}';
    }
   } else {
    return 'null';
   }
   break;
  case 'string':
   var encoded = obj.replace(/(.)/g, function(x) {
     if (x == "'" || x == '"' || x == '\\') {
       return "\\" + x;
     }
     var code = x.charCodeAt(0);
     if (code > 127 || code < 32) {
       var outCode = code.toString(16);
       switch (outCode.length) {
         case 4:
           return "\\u" + outCode;
         case 3:
           return "\\u0" + outCode;
         case 2:
           return "\\u00" + outCode;
         case 1:
           return "\\u000" + outCode;
         default:
           return x;
       }
     }
     return x;
   });
   return '"' + encoded + '"';
  case 'number':
  case 'boolean':
   return String(obj);
  case 'function':
   return 'badfunction';
  case 'undefined':
    return 'undefined';
  default:
   throw new Error("invalid type: " + typeof obj);
 }
}

function xhrAuthRequest(method, endpoint, callback) {
  var paramBuilder = new Array(arguments.length*3);
  for (var i = 3; i < arguments.length; i=i+2) {
    if (i > 3) paramBuilder.push("&");
    paramBuilder.push(arguments[i]);
    paramBuilder.push("=");
    paramBuilder.push(arguments[i+1]);
  }
  var params = paramBuilder.join("");
  var xhr = findXhr();
  if (method == "POST") {
    xhr.open(method, loginUrlBase + endpoint + ".php", true);
    xhr.setRequestHeader("Content-type","application/x-www-form-urlencoded");
  } else {
    xhr.open(method, loginUrlBase + endpoint + ".php?" + params, true);
  }

  var done = false;

  xhr.onreadystatechange = function() {
    if (done) return;
    if (xhr.readyState != 4) return;
    done = true;
    var ok = xhr.status == 200;
    var response = {};
    try {
      if (xhr.responseText) response = JSON.parse(xhr.responseText);
    } catch (e) {
      ok = false;
    }
    if (!ok) {
      if (!response.error) response.error = "unknown error";
      response.status = xhr.status;
    }
    if (callback) safeCall(null, function() {callback(ok, response);});
  };
  xhr.send(params);
}

function computeCookie(stats, temps, lineNum, indent, deleted, undeleted) {
  var scene = stats.scene;
  delete stats.scene;
  if (scene) stats.sceneName = scene.name;
  var version = "UNKNOWN";
  if (typeof(window) != "undefined" && window && window.version) version = window.version;
  var obj = { version: version, stats: stats, temps: temps, lineNum: lineNum, indent: indent };
  if (deleted) obj.deleted = deleted;
  if (undeleted) obj.undeleted = undeleted;
  var value = toJson(obj);
  stats.scene = scene;
  return value;
}

    var result = defaultValue;

webSaveDomain = "www.choiceofgames.com";

function submitRemoteSave(slot, email, subscribe, callback) {
  if (!isWebSavePossible()) return safeTimeout(function() { callback(false); });
  window.store.get("state"+slot, function(ok, value) {
    if (ok) {
      var timestamp = slot.substring(4/*"save".length*/);
      var xhr = findXhr();

      var params = "email="+email+"&game="+gameName+"&realGame="+window.storeName+"&json="+encodeURIComponent(value)+"&timestamp="+ timestamp+"&subscribe="+subscribe;
      xhr.open("POST", webSaveUrl,true);

      var done = false;

      xhr.onreadystatechange = function() {
        if (done) return;
        if (xhr.readyState != 4) return;
        done = true;
        var ok = xhr.status == 200;
        if (ok) {
          safeCall(null, function() {callback(true);});
        } else {
          recordDirtySlots([slot], function() {
            safeCall(null, function() {callback(false);});
          });
        }
      };
      xhr.send(params);
    } else {
      recordDirtySlots([slot], function() {
        asyncAlert("There was a problem uploading the saved game. This is probably a bug; please contact support@choiceofgames.com with code 17891.", function() {

  try {
    getDirtySaveList(function(dirtySaveList) {
      if (dirtySaveList && dirtySaveList.length) {
        try {
          fetchEmail(function(email) {
            if (email) {
              submitDirtySaves(dirtySaveList, email, callback);
            } else {
              callback(false);
            }
          });

function getRemoteSaves(email, callback) {
  if (!isWebSavePossible()) {
    safeTimeout(function() {callback([]);}, 0);
    return;
  }
  var xhr = findXhr();
  var gameName = window.remoteStoreName || window.storeName;
  xhr.open("GET", webSaveUrl + "?email="+email+"&game="+gameName, true);
  var done = false;
  xhr.onreadystatechange = function() {
    if (done) return;
    if (xhr.readyState != 4) return;
    done = true;
    if (xhr.status != 200) {
      if (window.console) console.log("Couldn't load remote saves. " + xhr.status + ": " + xhr.responseText);
      safeCall(null, function() {callback(null);});
    } else {
      var result = xhr.responseText;
      result = jsonParse(result);
      var remoteSaveList = [];
      for (var i = 0; i < result.length; i++) {
        if (!result[i]) continue;
        var save = result[i].json;
        if (!save) continue;
        save.timestamp = result[i].timestamp;
        remoteSaveList.push(save);
      }
      safeCall(null, function() {callback(remoteSaveList);});
    }
  };
  xhr.send();
}

function mergeRemoteSaves(remoteSaveList, recordDirty, callback) {
  if (!isWebSavePossible()) {
    safeTimeout(function() { callback([], 0, []); }, 0);
    return;
  }
  restoreObject(initStore(), "save_list", [], function (localSlotList) {
    fetchSavesFromSlotList(initStore(), localSlotList, 0, [], function(localSaveList) {
      var localSlotMap = {};
      for (var i = 0; i < localSlotList.length; i++) {
        localSlotMap[localSlotList[i]] = i;
      }
      var remoteSlotMap = {};
      for (i = 0; i < remoteSaveList.length; i++) {
        remoteSlotMap["save"+remoteSaveList[i].timestamp] = 1;
      }
      var newRemoteSaves = 0;
      for (i = 0; i < remoteSaveList.length; i++) {
        var remoteSave = remoteSaveList[i];
        var slot = "save"+remoteSave.timestamp;
        saveCookie(null, slot, remoteSave.stats, remoteSave.temps, remoteSave.lineNum, remoteSave.indent, remoteSave.deleted, remoteSave.undeleted);
        if (typeof localSlotMap[slot] !== 'undefined') {
          localSaveList[localSlotMap[slot]] = remoteSave;
        } else {
          localSlotList.push(slot);
          localSaveList.push(remoteSave);
          newRemoteSaves++;
        }
      }

      var dirtySaveList = [];
      for (i = 0; i < localSlotList.length; i++) {
        if (!remoteSlotMap[localSlotList[i]]) {
          dirtySaveList.push(localSlotList[i]);
        }
      }

      if (recordDirty) {
        window.store.set("dirty_save_list", toJson(dirtySaveList), finale);
      } else {
        finale();
      }

      function finale() {
        if (newRemoteSaves) {
          window.store.set("save_list", toJson(localSlotList), function() {
            safeCall(null, function() { callback(localSaveList, newRemoteSaves, dirtySaveList); });
          });
        } else {
          safeCall(null, function() {callback(localSaveList, newRemoteSaves, dirtySaveList);});
        }
      }
    });
  });
}

function submitReceipts(receipts, callback) {
  console.log("submitReceipts: " + JSON.stringify(receipts));
  if (!callback) callback = function(error) {
    if (window.transferPurchaseCallback) {
      window.transferPurchaseCallback(error || "done");
    }
  };
  var appId = receipts.appId;
  var count = 0;
  var error;
  function submitCallback(product) {
    return function submitCallback(ok, response) {
      if (!ok) {
        console.log("failed: " + product + " " + JSON.stringify(response));
        if (!error) {
          var match = /^receipt transaction already processed: (\d+) current login (\d+)$/.exec(response.error);
          if (match) {
            callback("409-" + match[1] + "-" + match[2]);
          } else {
            callback("" + response.status + "r");
          }
        }
        error = true;
      }
      if (error) return;
      count--;
      if (!count) {
        if (!receipts.avoidOverrides) cacheKnownPurchases(response);
        callback();
      }
    }
  }

  if (window.isAndroidApp) {
    window.store.get("login", function(ok, loginId) {
      loginId = loginId || 0;
      var platform = window.isAmazonAndroidApp ? 'amazon' : 'google';
      if (receipts.prePurchased && platform === 'google') {
        for (var i = 0; i < receipts.prePurchased.length; i++) {
          var product = receipts.prePurchased[i];
          count++;
          xhrAuthRequest("POST", "submit-device-receipt", submitCallback(product),
            'platform', platform,
            'company', receipts.company,
            'game_id', window.storeName,
            'app_package', appId,
            'product_id', product,
            'signature', encodeURIComponent(receipts.signature),
            'receipt', encodeURIComponent(receipts.signedData),
            'login_id', loginId
          );
        }
      }
      if (receipts.iaps) {
        for (var product in receipts.iaps) {
          count++;
          xhrAuthRequest("POST", "submit-device-receipt", submitCallback(product),
            'platform', platform,
            'company', receipts.company,
            'game_id', window.storeName,
            'app_package', appId,
            'product_id', product,
            'receipt', encodeURIComponent(receipts.iaps[product]),
            'login_id', loginId
          );
        }
      }
      if (!count) safeTimeout(function () { callback(); }, 0);
    });
  } else {
    callback("error");
  }
}

function loadAndRestoreGame(slot, forcedScene, forcedStats, forcedTemps) {

function restartGame(shouldPrompt) {

    delayBreakEnd();

    clearCookie(function() {
      _global.nav.resetStats(_global.stats);
      clearScreen(restoreGame);
    }, "");
  }
  if (shouldPrompt) {
    asyncConfirm("Start over from the beginning?", actuallyRestart);
  } else {
    actuallyRestart(true);
  }
}

function restoreGame(state, forcedScene, userRestored, forcedStats, forcedTemps) {
    var scene;
    var secondaryMode = null;
    var saveSlot = "";
    var forcedSceneLabel = null;
    if (/\|/.test(forcedScene)) {
      var parts = forcedScene.split("|");
      forcedScene = parts[0];
      forcedSceneLabel = parts[1];
    }
    if (forcedScene == "choicescript_stats") {
      secondaryMode = "stats";
      saveSlot = "temp";
    } else if (forcedScene == "choicescript_upgrade") {
      secondaryMode = "upgrade";
      saveSlot = "temp";
    }

function updateSinglePaidSceneCache(sceneName, callback) {

      var canonicalHref = canonical && canonical.getAttribute("href");
      if (window.beta) {
        canonicalHref = canonicalHref.replace('https://www.choiceofgames.com/', 'https://www.choiceofgames.com/beta/');
      }
      var url = canonicalHref + "scenes/" + fileName + "?hash="+hashes.scenes[fileName];
      xhr.open("GET", url);
      xhr.withCredentials = true;
      xhr.onload = function() {
        var error;
        if (xhr.status !== 200) {
          try {
            error = JSON.parse(xhr.responseText).error;
          } catch (e) {}
        }
        if (xhr.status === 404) {
          try {
            if (error === "hash doesn't match") {
              return awaitAppUpdate(function() {
                callback("strange");
              })
            }
          } catch (e) {
            if (window.console) console.error(e, e.stack);
          }
        }
        if (xhr.status == 403 && _global.isOmnibusApp && _global.isAndroidApp) {
          if (!receiptsSent) {
            window.receiptRequestCallback = function(receipts) {
              window.receiptRequestCallback = null;
              submitReceipts(receipts, function(error) {
                if (error) {
                  return callback(error);
                } else {
                  actualRequest("receiptsSent");
                }
              });
            }
            androidBilling.requestReceipts();
            return;
          } else if (error === "not registered" || error == "not purchased") {
            return callback(error);
          }
        } else if (xhr.status !== 200) {
          return callback(xhr.status);
        }
        var result;
        try {
          result = jsonParse(xhr.responseText);
        } catch (e) {
          if (window.console) console.error(e, e.stack);
        }
        var ok = result && result.crc && result.lines && result.labels;
        if (!ok) return callback("network");
        window.store.set("cache_scene_"+sceneName, xhr.responseText, function() {
          window.store.set("cache_scene_hash_"+sceneName, hashes.scenes[fileName], function() {
            callback(null, result);
          });
        });
      };
      xhr.onerror = function() {
        callback("network");
      }
      console.log("updateSinglePaidSceneCache " + url);
      xhr.send();
    }
    actualRequest();
  }
}

      )
    }
    if (nav.achievementList.length) options.push(
      { name: "View achievements.", group: "choice", achievements: true }
    );
    options.push(
      {name:"Restart the game.", group:"choice", restart:true},
      {name:"Change settings.", group:"choice", settings:true},
      {name:"Play more games like this.", group:"choice", moreGames:true}
    );
    if (isWebSavePossible() && !window.isSteamApp) {
      options.push(
        { name: "Email us at " + getSupportEmail() + ".", group: "choice", contactUs: true },
        { name: "Report a bug.", group: "choice", reportBug: true },
        { name: "Share this game with friends.", group: "choice", share: true },
      )
    }
    options.push(
      {name:"Email me when new games are available.", group:"choice", subscribe:true},
      {name:"Show keyboard shortcuts.", group:"choice", shortcuts:true}
    );
    if (document.getElementById("aboutLink")) {
      options.push({name:"View the credits.", group:"choice", credits:true});
    }

    if (logoutLink && logoutLink.style.display !== "none") {
      options.push({ name: "Sign out.", group: "choice", logout: true });
    }
    printOptions([""], options, function(option) {
      if (option.resume) {
        return clearScreen(function() {
          setButtonTitles();
          loadAndRestoreGame();
        });
      } else if (option.quit) {
        require('electron').ipcRenderer.invoke('quit');
      } else if (option.achievements) {
        return showAchievements();
      } else if (option.restart) {
        if (_global.blockRestart) {
          asyncAlert("Please wait until the timer has run out.");
          return;
        }
        return clearScreen(function() {
          var text = document.getElementById('text');
          text.innerHTML = "Start over from the beginning?";
          var options = [
            {name: "Restart the game.", group:"choice", restart: true},
            {name: "Cancel.", group: "choice", restart: false },
          ]
          printOptions([""], options, function(option) {
            if (option.restart) {
              clearScreen(function() {
                setButtonTitles();
                restartGame();
              })
            } else {
              clearScreen(function() {
                setButtonTitles();
                loadAndRestoreGame();
              })
            }
          })
          curl();
        });
      } else if (option.settings) {
        textOptionsMenu({ size: 1, color: 1, animation: window.animationProperty, sliding: window.isMobile });
      } else if (option.credits) {
        absolutizeAboutLink();
        aboutClick();
      } else if (option.moreGames) {
        moreGames();
        curl();
      } else if (option.share) {
        clearScreen(function() {
          printShareLinks(document.getElementById("text"), "now");
          menu();
        });
      } else if (option.subscribe) {
        setButtonTitles();
        subscribeLink();
      } else if (option.contactUs) {
        window.location.href="mailto:"+getSupportEmail();
      } else if (option.reportBug) {
        clearScreen(function() {
          reportBug();
          showMenu();
        });
      } else if (option.shortcuts) {
        var dialog = document.getElementById('keyboardShortcuts');
        if (dialog && dialog.showModal) dialog.showModal();
      } else if (option.logout) {
        clearScreen(function() {
          logout();
          loginDiv();
          printParagraph("You have been signed out.");
          menu();
        })
      }
    });
    // show title and author on menu screen
    // this will be hidden on desktop web, but visible elsewhere
    changeTitle(document.title);
    changeAuthor(document.getElementById("author").innerText.substring(3));
    if (window.isSteamApp) {
      printParagraph("Need help? Email us at " + getSupportEmail() + ".");
    }
    curl();
  }
  clearScreen(menu);
}

    } else if (categories.size && categories.color) {
      text.innerHTML = "<p>Change the game's appearance.</p>";
    } else if (categories.size) {
      text.innerHTML = "<p>Make the text bigger or smaller.</p>";
    } else if (categories.color) {
      text.innerHTML = "<p>Change the background color.</p>";
    } else if (categories.animation) {
      text.innerHTML = "<p>Change the animation between pages.</p>";
    } else if (categories.sliding) {
      text.innerHTML = "<p>Enable or disable touch slide controls.</p>";
    }
